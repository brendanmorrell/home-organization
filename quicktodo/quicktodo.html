<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Todo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 7px;
    --bg-base: #1a1a2e;
    --bg-surface: #16213e;
    --bg-elevated: #1c2a4a;
    --bg-row-alt: rgba(255,255,255,0.025);
    --text-primary: #e8e8f0;
    --text-secondary: #8888aa;
    --text-muted: #555577;
    --border-subtle: rgba(255,255,255,0.06);
    /* Neutral defaults (no list selected) */
    --neon: #888;
    --neon-dim: #555;
    --neon-glow: rgba(136,136,136,0.3);
    --neon-wash: rgba(136,136,136,0.06);
    --neon-wash-strong: rgba(136,136,136,0.12);
    --neon-tint-bg: #1a1a2e;
    --neon-tint-surface: #16213e;
    --neon-tint-row: rgba(136,136,136,0.03);
    --neon-tint-input: rgba(136,136,136,0.06);
    --neon-tint-border: rgba(136,136,136,0.10);
  }

  /* ── Neon palette — 8 vivid neon hues ── */
  .color-0 { /* Electric Cyan */
    --neon: #00e5ff; --neon-dim: #00a0b2;
    --neon-glow: rgba(0,229,255,0.35);
    --neon-wash: rgba(0,229,255,0.06);
    --neon-wash-strong: rgba(0,229,255,0.14);
    --neon-tint-bg: #111c24;
    --neon-tint-surface: #0e1f2e;
    --neon-tint-row: rgba(0,229,255,0.03);
    --neon-tint-input: rgba(0,229,255,0.07);
    --neon-tint-border: rgba(0,229,255,0.15);
  }
  .color-1 { /* Neon Violet */
    --neon: #b24dff; --neon-dim: #7e35b5;
    --neon-glow: rgba(178,77,255,0.35);
    --neon-wash: rgba(178,77,255,0.06);
    --neon-wash-strong: rgba(178,77,255,0.14);
    --neon-tint-bg: #1a1428;
    --neon-tint-surface: #1e1636;
    --neon-tint-row: rgba(178,77,255,0.03);
    --neon-tint-input: rgba(178,77,255,0.07);
    --neon-tint-border: rgba(178,77,255,0.15);
  }
  .color-2 { /* Neon Green */
    --neon: #39ff85; --neon-dim: #28b25d;
    --neon-glow: rgba(57,255,133,0.35);
    --neon-wash: rgba(57,255,133,0.06);
    --neon-wash-strong: rgba(57,255,133,0.14);
    --neon-tint-bg: #111e18;
    --neon-tint-surface: #0e2418;
    --neon-tint-row: rgba(57,255,133,0.03);
    --neon-tint-input: rgba(57,255,133,0.07);
    --neon-tint-border: rgba(57,255,133,0.15);
  }
  .color-3 { /* Neon Orange */
    --neon: #ff9f1c; --neon-dim: #c07515;
    --neon-glow: rgba(255,159,28,0.35);
    --neon-wash: rgba(255,159,28,0.06);
    --neon-wash-strong: rgba(255,159,28,0.14);
    --neon-tint-bg: #1e1811;
    --neon-tint-surface: #241c0e;
    --neon-tint-row: rgba(255,159,28,0.03);
    --neon-tint-input: rgba(255,159,28,0.07);
    --neon-tint-border: rgba(255,159,28,0.15);
  }
  .color-4 { /* Neon Pink */
    --neon: #ff2d78; --neon-dim: #c01f5a;
    --neon-glow: rgba(255,45,120,0.35);
    --neon-wash: rgba(255,45,120,0.06);
    --neon-wash-strong: rgba(255,45,120,0.14);
    --neon-tint-bg: #1e1118;
    --neon-tint-surface: #240e1a;
    --neon-tint-row: rgba(255,45,120,0.03);
    --neon-tint-input: rgba(255,45,120,0.07);
    --neon-tint-border: rgba(255,45,120,0.15);
  }
  .color-5 { /* Neon Yellow */
    --neon: #e8ff30; --neon-dim: #a8b820;
    --neon-glow: rgba(232,255,48,0.30);
    --neon-wash: rgba(232,255,48,0.05);
    --neon-wash-strong: rgba(232,255,48,0.12);
    --neon-tint-bg: #1a1c11;
    --neon-tint-surface: #20220e;
    --neon-tint-row: rgba(232,255,48,0.025);
    --neon-tint-input: rgba(232,255,48,0.06);
    --neon-tint-border: rgba(232,255,48,0.13);
  }
  .color-6 { /* Neon Teal */
    --neon: #14f0c8; --neon-dim: #0eb899;
    --neon-glow: rgba(20,240,200,0.35);
    --neon-wash: rgba(20,240,200,0.06);
    --neon-wash-strong: rgba(20,240,200,0.14);
    --neon-tint-bg: #111e1c;
    --neon-tint-surface: #0e2420;
    --neon-tint-row: rgba(20,240,200,0.03);
    --neon-tint-input: rgba(20,240,200,0.07);
    --neon-tint-border: rgba(20,240,200,0.15);
  }
  .color-7 { /* Neon Magenta */
    --neon: #ff47ff; --neon-dim: #b830b8;
    --neon-glow: rgba(255,71,255,0.35);
    --neon-wash: rgba(255,71,255,0.06);
    --neon-wash-strong: rgba(255,71,255,0.14);
    --neon-tint-bg: #1e1120;
    --neon-tint-surface: #24102a;
    --neon-tint-row: rgba(255,71,255,0.03);
    --neon-tint-input: rgba(255,71,255,0.07);
    --neon-tint-border: rgba(255,71,255,0.15);
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
    font-size: 13px;
    background: transparent;
    color: var(--text-primary);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── App shell ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--neon-tint-bg);
    transition: all 0.3s ease;
    border: 1px solid var(--border-subtle);
  }

  /* ── Titlebar — neon header ── */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 34px;
    padding: 0 14px;
    background: var(--neon-tint-surface);
    flex-shrink: 0;
    cursor: grab;
    transition: all 0.3s ease;
    position: relative;
    z-index: 2;
    border-bottom: 1px solid var(--neon-dim);
    box-shadow: 0 1px 12px var(--neon-glow), inset 0 -1px 0 var(--neon-wash-strong);
  }
  .titlebar:active { cursor: grabbing; }
  .titlebar-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    text-shadow: 0 0 10px var(--neon-glow), 0 0 20px var(--neon-glow);
  }

  /* ── Collapsible ── */
  .collapsible {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .app.collapsed .collapsible { display: none; }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: var(--neon-tint-surface);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s ease;
    letter-spacing: 0.2px;
  }
  .tab:hover {
    background: var(--neon-wash-strong);
    border-color: var(--neon-dim);
    color: var(--neon);
    text-shadow: 0 0 8px var(--neon-glow);
    box-shadow: 0 0 8px var(--neon-wash-strong);
  }
  .tab.active {
    background: var(--neon-wash-strong);
    color: #fff;
    border-color: var(--neon);
    box-shadow: 0 0 12px var(--neon-glow), 0 0 4px var(--neon-wash-strong);
    text-shadow: 0 0 10px var(--neon-glow), 0 0 20px var(--neon-glow);
  }
  .tab.active .tab-close { color: rgba(255,255,255,0.7); }
  .tab.active .tab-close:hover { color: #fff; }
  .tab .tab-close {
    display: none;
    font-size: 13px;
    line-height: 1;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0 1px;
    border-radius: 50%;
    opacity: 0.6;
    transition: opacity 0.1s;
  }
  .tab:hover .tab-close { display: inline-flex; color: var(--neon); }
  .tab .tab-close:hover { opacity: 1; }

  .tab-name { cursor: pointer; }

  .tab-add {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    font-size: 16px;
    color: var(--text-muted);
    cursor: pointer;
    flex-shrink: 0;
    border-radius: 50%;
    transition: all 0.2s ease;
    border: 1.5px solid transparent;
  }
  .tab-add:hover {
    background: var(--neon-wash-strong);
    color: var(--neon);
    border-color: var(--neon-dim);
    box-shadow: 0 0 8px var(--neon-wash);
    text-shadow: 0 0 6px var(--neon-glow);
  }

  /* ── List area ── */
  .list-area {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }
  .list-area::-webkit-scrollbar { width: 5px; }
  .list-area::-webkit-scrollbar-track { background: transparent; }
  .list-area::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
  }
  .list-area::-webkit-scrollbar-thumb:hover { background: var(--neon-dim); }

  /* ── Todo items ── */
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    margin-bottom: 2px;
    cursor: default;
    border-radius: var(--radius-xs);
    transition: all 0.15s ease;
    background: transparent;
    border: 1px solid transparent;
  }
  .todo-item:nth-child(even) {
    background: var(--neon-tint-row);
  }
  .todo-item:hover {
    background: var(--neon-wash);
    border-color: rgba(255,255,255,0.04);
  }

  .todo-check {
    width: 19px;
    height: 19px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 0px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    background: transparent;
  }
  .todo-check:hover {
    border-color: var(--neon);
    box-shadow: 0 0 8px var(--neon-glow);
    transform: scale(1.1);
  }
  .todo-item.done .todo-check {
    border-color: transparent;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon-glow);
    transform: scale(1);
  }
  .todo-item.done .todo-check::after {
    content: "\2713";
    font-size: 11px;
    color: #fff;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* ── In-flight state — amber ── */
  .todo-item.inflight .todo-check {
    border-color: transparent;
    background: #f59e0b;
    box-shadow: 0 0 8px rgba(245,158,11,0.4);
    transform: scale(1);
  }
  .todo-item.inflight .todo-check::after {
    content: "▸";
    font-size: 13px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .todo-text {
    flex: 1;
    line-height: 1.45;
    padding: 0;
    word-break: break-word;
    color: var(--text-primary);
    transition: all 0.2s ease;
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .todo-item.inflight .todo-text {
    color: #f59e0b;
  }

  .todo-delete {
    opacity: 0;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 5px;
    flex-shrink: 0;
    line-height: 1;
    border-radius: 6px;
    transition: all 0.15s ease;
  }
  .todo-item:hover .todo-delete { opacity: 1; }
  .todo-delete:hover {
    color: var(--neon);
    text-shadow: 0 0 6px var(--neon-glow);
  }

  /* ── Input area ── */
  .input-area {
    padding: 8px 10px;
    flex-shrink: 0;
    background: var(--neon-tint-surface);
    border-top: 1px solid var(--border-subtle);
  }
  .input-area input {
    width: 100%;
    padding: 9px 14px;
    background: var(--neon-tint-input);
    border: 1.5px solid var(--neon-tint-border);
    border-radius: var(--radius-sm);
    outline: none;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    transition: all 0.25s ease;
  }
  .input-area input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 12px var(--neon-glow), 0 0 4px var(--neon-wash-strong);
    background: var(--neon-wash);
  }
  .input-area input::placeholder { color: var(--text-muted); }

  /* ── Inline item edit ── */
  .todo-edit-input {
    flex: 1;
    background: var(--neon-wash);
    border: 1.5px solid var(--neon-dim);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.45;
    padding: 2px 8px;
    outline: none;
    border-radius: 6px;
    box-shadow: 0 0 8px var(--neon-glow);
    width: 100%;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 13px;
    gap: 6px;
    padding: 20px;
    text-align: center;
  }
  .empty-state .hint {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 14px 7px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    background: var(--neon-tint-surface);
    border-top: 1px solid var(--border-subtle);
  }
  .clear-done {
    cursor: pointer;
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 6px;
    transition: all 0.2s ease;
    border: 1px solid transparent;
  }
  .clear-done:hover {
    color: var(--neon);
    background: var(--neon-wash);
    border-color: var(--neon-dim);
    text-shadow: 0 0 6px var(--neon-glow);
    box-shadow: 0 0 8px var(--neon-wash);
  }

  /* ── Tab rename input ── */
  .tab-rename-input {
    background: var(--bg-elevated);
    border: 1.5px solid var(--neon);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    outline: none;
    border-radius: 12px;
    width: 90px;
    box-shadow: 0 0 10px var(--neon-glow);
  }

  /* ── Drag styles ── */
  .todo-item.dragging { opacity: 0.35; }
  .todo-item.drag-over { box-shadow: 0 -2px 0 var(--neon); }

  /* ── Context menu ── */
  .ctx-menu {
    position: fixed;
    background: var(--neon-tint-surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 4px 0;
    min-width: 160px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 9999;
    font-size: 12px;
  }
  .ctx-menu-item {
    padding: 6px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .ctx-menu-item:hover {
    background: var(--neon-wash-strong);
    color: var(--neon);
    text-shadow: 0 0 6px var(--neon-glow);
  }
  .ctx-menu-item .ctx-check {
    width: 14px;
    font-size: 12px;
    color: var(--neon);
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="titlebar" id="titlebar">
    <span class="titlebar-label">QuickTodo</span>
  </div>
  <div class="collapsible">
    <div class="tab-bar" id="tabBar"></div>
    <div class="list-area" id="listArea"></div>
    <div class="input-area" id="inputArea">
      <input type="text" id="newItemInput" placeholder="Add a task…" autofocus>
    </div>
    <div class="status-bar" id="statusBar">
      <span id="statusText"></span>
      <span class="clear-done" id="clearDone" title="Remove completed items">clear done</span>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bbztmfiefxymkfmmplfj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-pkNGDQJIBajbVAPgcbe_Q_OcPtkJ1X';
const SB_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

const NUM_COLORS = 8;
const STORAGE_KEY = 'quicktodo_data';
let state = defaultState();
let pendingRenameIndex = null;
let pywebviewReady = false;

function defaultState() {
  return { activeList: 0, lists: [] };
}

function parseState(raw) {
  try {
    if (raw) {
      const s = JSON.parse(raw);
      if (s.lists) {
        s.lists.forEach((l, i) => {
          if (l.colorIndex === undefined) l.colorIndex = i % NUM_COLORS;
          // Migrate old items: convert boolean done to status field
          l.items.forEach(item => {
            if (item.status === undefined) {
              item.status = item.done ? 'done' : 'todo';
            }
            // Keep done in sync for backward compat
            item.done = item.status === 'done';
          });
        });
        return s;
      }
    }
  } catch(e) {}
  return null;
}

// Sort order: todo (0) → inflight (1) → done (2)
function sortItems(items) {
  const order = { todo: 0, inflight: 1, done: 2 };
  items.sort((a, b) => (order[a.status] || 0) - (order[b.status] || 0));
}

function loadStateFromLocalStorage() {
  try {
    return parseState(localStorage.getItem(STORAGE_KEY));
  } catch(e) {}
  return null;
}

async function loadStateFromFile() {
  if (window.pywebview && window.pywebview.api) {
    try {
      const raw = await window.pywebview.api.load_data();
      return parseState(raw);
    } catch(e) {}
  }
  return null;
}

function saveState() {
  const json = JSON.stringify(state);
  // Always save to localStorage as fallback
  try { localStorage.setItem(STORAGE_KEY, json); } catch(e) {}
  // Save to file via Python API (the reliable path)
  if (window.pywebview && window.pywebview.api) {
    try { window.pywebview.api.save_data(json); } catch(e) {}
  }
  // Sync to Supabase (debounced)
  debouncedSaveToSupabase();
}

// QuickTodo runs on Brendan's Mac — hardcode owner filter
const QUICKTODO_OWNER = 'brendan';

async function loadFromSupabase() {
  try {
    const [listsRes, itemsRes] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/todo_lists?order=sort_order', { headers: SB_HEADERS }),
      fetch(SUPABASE_URL + '/rest/v1/todo_items?order=sort_order', { headers: SB_HEADERS })
    ]);
    if (!listsRes.ok || !itemsRes.ok) return null;
    const allLists = await listsRes.json();
    const items = await itemsRes.json();
    // Filter: show Brendan's lists + shared lists (owner is null), hide Sarah's personal lists
    const lists = allLists.filter(l => !l.owner || l.owner === QUICKTODO_OWNER);
    // Group items by list_id
    const itemsByList = {};
    items.forEach(item => {
      if (!itemsByList[item.list_id]) itemsByList[item.list_id] = [];
      itemsByList[item.list_id].push(item);
    });
    return {
      activeList: 0,
      lists: lists.map(l => ({
        name: l.name,
        colorIndex: l.color_index !== undefined ? l.color_index : 0,
        owner: l.owner || null,
        _id: l.id,
        items: (itemsByList[l.id] || []).map(it => ({
          text: it.text,
          status: it.status || 'todo',
          done: it.status === 'done',
          _id: it.id
        }))
      }))
    };
  } catch (e) {
    console.log('loadFromSupabase error:', e);
    return null;
  }
}

async function saveToSupabase() {
  try {
    // Delete all items, then all lists
    await fetch(SUPABASE_URL + '/rest/v1/todo_items?id=not.is.null', { method: 'DELETE', headers: SB_HEADERS });
    await fetch(SUPABASE_URL + '/rest/v1/todo_lists?id=not.is.null', { method: 'DELETE', headers: SB_HEADERS });
    // Insert lists one by one to get back IDs
    for (let i = 0; i < state.lists.length; i++) {
      const list = state.lists[i];
      const res = await fetch(SUPABASE_URL + '/rest/v1/todo_lists', {
        method: 'POST',
        headers: SB_HEADERS,
        body: JSON.stringify({ name: list.name, color_index: list.colorIndex, sort_order: i, owner: list.owner || null })
      });
      if (!res.ok) continue;
      const created = await res.json();
      const listId = created[0].id;
      // Insert items for this list
      if (list.items.length > 0) {
        const itemPayload = list.items.map((item, j) => ({
          list_id: listId,
          text: item.text,
          status: item.status || (item.done ? 'done' : 'todo'),
          sort_order: j
        }));
        await fetch(SUPABASE_URL + '/rest/v1/todo_items', {
          method: 'POST',
          headers: SB_HEADERS,
          body: JSON.stringify(itemPayload)
        });
      }
    }
  } catch (e) {
    console.log('saveToSupabase error:', e);
  }
}

let _sbTimer = null;
let _savingToSupabase = false;
function debouncedSaveToSupabase() {
  if (_sbTimer) clearTimeout(_sbTimer);
  _sbTimer = setTimeout(() => { _savingToSupabase = true; saveToSupabase().finally(() => { _savingToSupabase = false; }); }, 500);
}

// ── Poll for remote changes every 3 seconds ──
let _lastStateHash = '';
function hashState(s) { return JSON.stringify(s.lists?.map(l => l.name + '|' + l.items?.map(i => i.text + i.status).join(','))); }

setInterval(async () => {
  if (_savingToSupabase) return; // skip if we're currently saving
  try {
    const sbState = await loadFromSupabase();
    if (sbState && sbState.lists && sbState.lists.length > 0) {
      const newHash = hashState(sbState);
      if (newHash !== _lastStateHash) {
        _lastStateHash = newHash;
        state = sbState;
        render();
      }
    }
  } catch(e) {}
}, 3000);

// Called when pywebview API is ready
async function initFromFile() {
  pywebviewReady = true;
  const fileState = await loadStateFromFile();
  if (fileState && fileState.lists && fileState.lists.length > 0) {
    state = fileState;
  }
  render();
  document.getElementById('newItemInput').focus();
}

// Listen for pywebview ready event
window.addEventListener('pywebviewready', () => { initFromFile(); });

function render() {
  const app = document.getElementById('app');
  const activeList = state.lists[state.activeList];

  app.className = 'app';
  if (activeList) {
    app.classList.add('color-' + activeList.colorIndex);
  }
  if (app.dataset.collapsed === 'true') {
    app.classList.add('collapsed');
  }

  renderTabs();
  renderList();
  renderStatus();
  renderInputVisibility();
  saveState();
}

function renderInputVisibility() {
  const hasActiveList = state.lists.length > 0 && state.lists[state.activeList];
  document.getElementById('inputArea').style.display = hasActiveList ? 'block' : 'none';
  document.getElementById('statusBar').style.display = hasActiveList ? 'flex' : 'none';
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  state.lists.forEach((list, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab color-' + list.colorIndex + (i === state.activeList ? ' active' : '');

    const name = document.createElement('span');
    name.className = 'tab-name';
    name.textContent = list.name;

    let clickTimer = null;
    name.addEventListener('click', (e) => {
      e.stopPropagation();
      if (clickTimer) return;
      clickTimer = setTimeout(() => {
        clickTimer = null;
        state.activeList = i;
        render();
      }, 250);
    });
    name.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      startRenameTab(tab, name, i);
    });
    tab.appendChild(name);

    if (pendingRenameIndex === i) {
      setTimeout(() => startRenameTab(tab, name, i), 0);
      pendingRenameIndex = null;
    }

    const close = document.createElement('span');
    close.className = 'tab-close';
    close.textContent = '\u00d7';
    close.title = 'Delete this list';
    close.addEventListener('click', (e) => {
      e.stopPropagation();
      state.lists.splice(i, 1);
      if (state.activeList >= state.lists.length) state.activeList = Math.max(0, state.lists.length - 1);
      render();
    });
    tab.appendChild(close);

    bar.appendChild(tab);
  });

  const addBtn = document.createElement('div');
  addBtn.className = 'tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'New list';
  addBtn.addEventListener('click', () => {
    const colorIndex = state.lists.length % NUM_COLORS;
    state.lists.push({ name: 'New List', items: [], colorIndex, owner: QUICKTODO_OWNER });
    state.activeList = state.lists.length - 1;
    pendingRenameIndex = state.activeList;
    render();
  });
  bar.appendChild(addBtn);
}

function startRenameTab(tabEl, nameEl, index) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'tab-rename-input';
  inp.value = state.lists[index].name;

  nameEl.replaceWith(inp);
  inp.focus();
  inp.select();

  let finished = false;
  const finish = () => {
    if (finished) return;
    finished = true;
    const val = inp.value.trim();
    if (val) state.lists[index].name = val;
    render();
    document.getElementById('newItemInput').focus();
  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') { finished = true; render(); }
  });
}

let dragSrcIndex = null;

function renderList() {
  const area = document.getElementById('listArea');
  const list = state.lists[state.activeList];
  area.innerHTML = '';

  if (!list) {
    area.innerHTML = `
      <div class="empty-state">
        <div>No lists</div>
        <div class="hint">Hit + to create one</div>
      </div>`;
    return;
  }

  if (list.items.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div>No tasks yet</div>
        <div class="hint">Type below and hit Enter</div>
      </div>`;
    return;
  }

  list.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'todo-item' + (item.status === 'done' ? ' done' : '') + (item.status === 'inflight' ? ' inflight' : '');
    row.draggable = true;
    row.dataset.index = i;

    row.addEventListener('dragstart', (e) => {
      dragSrcIndex = i;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragSrcIndex = null;
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (dragSrcIndex !== null && dragSrcIndex !== i) {
        const items = state.lists[state.activeList].items;
        const [moved] = items.splice(dragSrcIndex, 1);
        items.splice(i, 0, moved);
        render();
      }
    });

    const check = document.createElement('div');
    check.className = 'todo-check';
    // Left-click: toggle between todo and done
    check.addEventListener('click', (e) => {
      e.stopPropagation();
      if (item.status === 'done') {
        item.status = 'todo';
        item.done = false;
      } else {
        item.status = 'done';
        item.done = true;
      }
      sortItems(list.items);
      render();
    });
    // Right-click: toggle inflight
    check.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (item.status === 'inflight') {
        item.status = 'todo';
        item.done = false;
      } else {
        item.status = 'inflight';
        item.done = false;
      }
      sortItems(list.items);
      render();
    });

    const text = document.createElement('div');
    text.className = 'todo-text';
    text.textContent = item.text;
    text.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      row.draggable = false;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'todo-edit-input';
      inp.value = item.text;
      text.replaceWith(inp);
      inp.focus();
      inp.select();
      let finished = false;
      const finish = () => {
        if (finished) return;
        finished = true;
        const val = inp.value.trim();
        if (val) {
          item.text = val;
        } else {
          list.items.splice(i, 1);
        }
        render();
      };
      inp.addEventListener('blur', finish);
      inp.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); finish(); }
        if (ev.key === 'Escape') { finished = true; render(); }
      });
    });

    const del = document.createElement('span');
    del.className = 'todo-delete';
    del.textContent = '\u00d7';
    del.addEventListener('click', () => {
      list.items.splice(i, 1);
      render();
    });

    row.appendChild(check);
    row.appendChild(text);
    row.appendChild(del);
    area.appendChild(row);
  });
}

function renderStatus() {
  const list = state.lists[state.activeList];
  if (!list) {
    document.getElementById('statusText').textContent = '';
    document.getElementById('clearDone').style.display = 'none';
    return;
  }
  const total = list.items.length;
  const done = list.items.filter(i => i.status === 'done').length;
  const inflight = list.items.filter(i => i.status === 'inflight').length;
  const todo = total - done - inflight;
  let parts = [];
  if (todo > 0) parts.push(`${todo} to do`);
  if (inflight > 0) parts.push(`${inflight} in flight`);
  if (done > 0) parts.push(`${done} done`);
  document.getElementById('statusText').textContent = total === 0 ? '' : parts.join(' \u00b7 ');
  document.getElementById('clearDone').style.display = done > 0 ? 'inline' : 'none';
}

const input = document.getElementById('newItemInput');
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim()) {
    addItems(input.value);
    input.value = '';
  }
});

input.addEventListener('paste', (e) => {
  const pasted = (e.clipboardData || window.clipboardData).getData('text');
  if (pasted && pasted.includes('\n')) {
    e.preventDefault();
    const prefix = input.value.substring(0, input.selectionStart);
    const suffix = input.value.substring(input.selectionEnd);
    addItems(prefix + pasted + suffix);
    input.value = '';
  }
});

function addItems(text) {
  if (state.lists.length === 0) return;
  const list = state.lists[state.activeList];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
  lines.forEach(line => {
    line = line.replace(/^(?:[-*\u2022\u2013\u2014]\s+|\d+[.)]\s+|\[.\]\s+)/, '');
    if (line) list.items.unshift({ text: line, done: false, status: 'todo' });
  });
  render();
  document.getElementById('listArea').scrollTop = document.getElementById('listArea').scrollHeight;
}

document.getElementById('clearDone').addEventListener('click', () => {
  const list = state.lists[state.activeList];
  if (list) {
    list.items = list.items.filter(i => i.status !== 'done');
    render();
  }
});

document.getElementById('titlebar').addEventListener('dblclick', () => {
  const app = document.getElementById('app');
  const isCollapsed = app.dataset.collapsed === 'true';
  app.dataset.collapsed = isCollapsed ? 'false' : 'true';
  app.classList.toggle('collapsed');
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.set_collapsed(!isCollapsed);
  }
});

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    input.focus();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 't') {
    e.preventDefault();
    document.querySelector('.tab-add').click();
  }
  if ((e.metaKey || e.ctrlKey) && e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < state.lists.length) {
      e.preventDefault();
      state.activeList = idx;
      render();
    }
  }
});

let ctxMenu = null;
function hideCtxMenu() {
  if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
}
document.addEventListener('click', hideCtxMenu);
document.addEventListener('contextmenu', async (e) => {
  e.preventDefault();
  hideCtxMenu();

  const menu = document.createElement('div');
  menu.className = 'ctx-menu';

  let isOnTop = false;
  if (window.pywebview && window.pywebview.api) {
    try { isOnTop = await window.pywebview.api.get_on_top(); } catch(e) {}
  }
  const floatItem = document.createElement('div');
  floatItem.className = 'ctx-menu-item';
  floatItem.innerHTML = `<span class="ctx-check">${isOnTop ? '\u2713' : ''}</span> Always on top`;
  floatItem.addEventListener('click', async () => {
    if (window.pywebview && window.pywebview.api) {
      try { await window.pywebview.api.toggle_on_top(); } catch(e) {}
    }
    hideCtxMenu();
  });
  menu.appendChild(floatItem);

  menu.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 40) + 'px';

  document.body.appendChild(menu);
  ctxMenu = menu;
});

// Initial render with localStorage data (fast), pywebview will override when ready
const lsState = loadStateFromLocalStorage();
if (lsState) state = lsState;
render();
input.focus();

// Load authoritative state from Supabase (overrides localStorage)
loadFromSupabase().then(sbState => {
  if (sbState && sbState.lists && sbState.lists.length > 0) {
    state = sbState;
    render();
  }
});

// If pywebview is already ready (race condition), init now
if (window.pywebview && window.pywebview.api) { initFromFile(); }
</script>
