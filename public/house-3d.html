<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0c12;
  --surface: #12151e;
  --surface2: #1a1e2c;
  --surface3: #222738;
  --border: #2a2f42;
  --text: #e8eaf2;
  --text-dim: #7c81a0;
  --accent: #5b8def;
  --accent-soft: rgba(91, 141, 239, 0.12);
  --highlight: #f5a623;
  --highlight-soft: rgba(245, 166, 35, 0.15);
  --green: #4caf50;
  --red: #ef5350;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.sidebar-header .sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}
.sidebar-section {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  padding: 16px 16px 6px;
}
.sidebar-body { flex: 1; padding: 0 8px; }
.nav-item {
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  margin-bottom: 2px;
  transition: all 0.15s ease;
  position: relative;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); }
.nav-item.has-results { background: var(--highlight-soft); }
.nav-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  color: var(--text-dim);
}
.nav-item.active .nav-icon { background: var(--accent); color: white; }
.nav-item.has-results .nav-icon { background: var(--highlight); color: white; }
.nav-label { flex: 1; font-weight: 500; }
.nav-count {
  font-size: 11px; color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 7px; border-radius: 10px;
  font-weight: 500;
}

/* Camera controls panel in sidebar */
.controls-section {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
}
.controls-section .section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px;
}
.ctrl-row { display: flex; gap: 4px; margin-bottom: 4px; }
.ctrl-btn {
  flex: 1; padding: 6px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Toggle button */
.toggle-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; width: 100%; justify-content: flex-start;
}
.toggle-indicator {
  display: inline-block; width: 28px; height: 16px;
  border-radius: 8px; background: var(--border); position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-indicator::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--text-dim); transition: all 0.2s;
}
.toggle-btn.active .toggle-indicator { background: var(--accent); }
.toggle-btn.active .toggle-indicator::after {
  left: 14px; background: #fff;
}

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* Top bar */
.topbar {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.search-box { flex: 1; max-width: 480px; position: relative; }
.search-box input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,141,239,0.15); }
.search-box input::placeholder { color: var(--text-dim); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }
.result-count { font-size: 12px; color: var(--text-dim); white-space: nowrap; font-weight: 500; }
.kbd-hint {
  font-size: 10px; color: var(--text-dim);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 5px; margin-left: auto; white-space: nowrap;
}

/* 3D Canvas area */
.content { flex: 1; position: relative; background: var(--bg); }
canvas#scene { width: 100% !important; height: 100% !important; display: block; }

/* Flyout tooltip */
.flyout {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 240px;
  max-width: 320px;
  z-index: 20;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  pointer-events: auto;
  animation: flyoutIn 0.2s ease-out;
}
@keyframes flyoutIn {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.flyout-close {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 16px; line-height: 1;
}
.flyout-close:hover { color: var(--text); }
.flyout-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.flyout-subtitle { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.flyout-category {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--accent); margin-bottom: 8px;
  padding: 3px 8px; background: var(--accent-soft); border-radius: 4px;
  display: inline-block;
}
.flyout-items { list-style: none; }
.flyout-items li {
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.flyout-items li:last-child { border-bottom: none; }
.flyout-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.flyout-dot.highlight { background: var(--highlight); }
.flyout-item-loc { color: var(--text-dim); font-size: 11px; }

/* Line canvas overlay */
#lineCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 15;
}

/* Search results panel */
.search-results-panel {
  position: absolute; top: 12px; right: 12px;
  background: rgba(18, 21, 30, 0.96);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  max-width: 280px;
  max-height: 50vh;
  overflow-y: auto;
  z-index: 10;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.search-results-title { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
.search-result-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,47,66,0.5);
  cursor: pointer; font-size: 12px;
  transition: color 0.1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { color: var(--accent); }
.search-result-name { font-weight: 600; }
.search-result-loc { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

/* Overlay hints */
.overlay-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(18, 21, 30, 0.92);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 11px; color: var(--text-dim);
  pointer-events: none;
  display: flex; gap: 12px; align-items: center;
  backdrop-filter: blur(8px);
}
.hint-item { display: flex; align-items: center; gap: 4px; }
.hint-key {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 5px; font-size: 10px;
  font-weight: 600;
}

/* Stats bar */
.stats {
  padding: 7px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 20px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}
.stat-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
</style>
</head>

function createWall(w, h, x, y, z, rotY, color, opacity, outwardNormal) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({
    color, transparent: true, opacity: opacity || 0.35,
    side: THREE.DoubleSide, roughness: 0.8, metalness: 0.05,
    polygonOffset: true,
    polygonOffsetFactor: -1,
    polygonOffsetUnits: -1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY || 0;
  mesh.castShadow = false;
  mesh.receiveShadow = true;
  mesh.userData._outwardNormal = outwardNormal;
  return mesh;
}

// Create a wall with openings (doors/windows/arches) cut out.
// Strategy: build the wall from rectangular PlaneGeometry strips around each opening.
// This avoids Shape hole triangulation issues in Three.js r128.
function createWallWithOpenings(wallW, wallH, openings, x, y, z, rotY, color, opacity, outwardNormal) {
  const wallGroup = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color, transparent: true, opacity: opacity || 0.35,
    side: THREE.DoubleSide, roughness: 0.8, metalness: 0.05,
    polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
  });

  // Collect all unique horizontal splits (y values) from openings
  // Each opening defines a horizontal band [hy-hh, hy+hh]
  const yMin = -wallH / 2, yMax = wallH / 2;
  const xMin = -wallW / 2, xMax = wallW / 2;

  // Sort openings by x position
  const sorted = openings.map(o => ({
    left: o.x - o.w/2,
    right: o.x + o.w/2,
    bottom: o.y - o.h/2,
    top: o.y + o.h/2,
    arch: o.arch,
    cx: o.x,
    hw: o.w/2,
  })).sort((a, b) => a.left - b.left);

  // Collect all unique y-splits from all openings
  let ySplits = [yMin, yMax];
  sorted.forEach(o => {
    ySplits.push(o.bottom, o.top);
  });
  ySplits = [...new Set(ySplits)].sort((a, b) => a - b);

  // For each horizontal band between consecutive ySplits, create strips
  for (let i = 0; i < ySplits.length - 1; i++) {
    const bandBot = ySplits[i];
    const bandTop = ySplits[i + 1];
    const bandH = bandTop - bandBot;
    if (bandH < 0.001) continue;
    const bandCenterY = (bandBot + bandTop) / 2;

    // Find which openings overlap this band
    const overlapping = sorted.filter(o => o.bottom < bandTop - 0.001 && o.top > bandBot + 0.001);

    if (overlapping.length === 0) {
      // Full strip across the wall
      const stripW = wallW;
      const geo = new THREE.PlaneGeometry(stripW, bandH);
      const mesh = new THREE.Mesh(geo, mat.clone());
      mesh.position.set(0, bandCenterY, 0);
      wallGroup.add(mesh);
    } else {
      // Create strips around openings
      let cursor = xMin;
      for (const o of overlapping) {
        // Strip before this opening
        if (o.left > cursor + 0.001) {
          const sw = o.left - cursor;
          const geo = new THREE.PlaneGeometry(sw, bandH);
          const mesh = new THREE.Mesh(geo, mat.clone());
          mesh.position.set(cursor + sw/2, bandCenterY, 0);
          wallGroup.add(mesh);
        }
        cursor = Math.max(cursor, o.right);
      }
      // Strip after last opening
      if (cursor < xMax - 0.001) {
        const sw = xMax - cursor;
        const geo = new THREE.PlaneGeometry(sw, bandH);
        const mesh = new THREE.Mesh(geo, mat.clone());
        mesh.position.set(cursor + sw/2, bandCenterY, 0);
        wallGroup.add(mesh);
      }
    }
  }

  // Add visible edge outlines around each opening (always visible even when wall is transparent)
  const edgeLineMat = new THREE.LineBasicMaterial({
    color: 0x90caf9, transparent: true, opacity: 0.7,
  });
  openings.forEach(o => {
    const hx = o.x, hy = o.y, hw = o.w/2, hh = o.h/2;
    const pts = [];
    if (o.arch) {
      const archR = hw;
      // Bottom-left up to arch start
      pts.push(new THREE.Vector3(hx - hw, hy - hh, 0.01));
      pts.push(new THREE.Vector3(hx - hw, hy + hh - archR, 0.01));
      // Approximate arch with segments
      for (let a = Math.PI; a >= 0; a -= Math.PI / 12) {
        pts.push(new THREE.Vector3(hx + Math.cos(a) * archR, hy + hh - archR + Math.sin(a) * archR, 0.01));
      }
      // Down right side
      pts.push(new THREE.Vector3(hx + hw, hy - hh, 0.01));
      pts.push(new THREE.Vector3(hx - hw, hy - hh, 0.01)); // close
    } else {
      pts.push(new THREE.Vector3(hx - hw, hy - hh, 0.01));
      pts.push(new THREE.Vector3(hx - hw, hy + hh, 0.01));
      pts.push(new THREE.Vector3(hx + hw, hy + hh, 0.01));
      pts.push(new THREE.Vector3(hx + hw, hy - hh, 0.01));
      pts.push(new THREE.Vector3(hx - hw, hy - hh, 0.01)); // close
    }
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    wallGroup.add(new THREE.Line(lineGeo, edgeLineMat));
  });

  wallGroup.position.set(x, y, z);
  wallGroup.rotation.y = rotY || 0;
  // Store outward normal on the group itself and propagate to children
  wallGroup.userData._outwardNormal = outwardNormal;
  wallGroup.userData._isWallGroup = true;
  return wallGroup;
}

ROOMS.forEach(room => {
  const group = new THREE.Group();
  group.position.set(room.pos_x, room.pos_y, room.pos_z);

  const W = room.width, D = room.depth, H = room.height;
  const c = new THREE.Color(room.color);
  const wallColor = c.clone().multiplyScalar(1.2);
  const roomWalls = [];

  // Floor — with polygonOffset to prevent z-fighting
  const floorMat = new THREE.MeshStandardMaterial({
    color: c.clone().multiplyScalar(0.4), roughness: 0.9, metalness: 0.0,
    side: THREE.DoubleSide,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1,
  });
  let floor;
  if (room.floorCutout) {
    // Build floor as strips around the cutout (stair opening)
    const cut = room.floorCutout;
    const floorGroup = new THREE.Group();
    floorGroup.position.y = -H / 2;
    // Strip 1: West of cutout (full N-S depth)
    if (cut.xMax < W/2) {
      const sw = W/2 - cut.xMax;
      const s = new THREE.Mesh(new THREE.PlaneGeometry(sw, D), floorMat);
      s.rotation.x = -Math.PI / 2;
      s.position.set((cut.xMax + W/2) / 2, 0, 0);
      s.receiveShadow = true;
      floorGroup.add(s);
    }
    // Strip 2: NE corner (north of cutout, east portion)
    if (cut.zMax < D/2) {
      const sd = D/2 - cut.zMax;
      const sw = cut.xMax - cut.xMin;
      const s = new THREE.Mesh(new THREE.PlaneGeometry(sw, sd), floorMat);
      s.rotation.x = -Math.PI / 2;
      s.position.set((cut.xMin + cut.xMax) / 2, 0, (cut.zMax + D/2) / 2);
      s.receiveShadow = true;
      floorGroup.add(s);
    }
    // Strip 3: SE corner (south of cutout, east portion)
    if (cut.zMin > -D/2) {
      const sd = cut.zMin - (-D/2);
      const sw = cut.xMax - cut.xMin;
      const s = new THREE.Mesh(new THREE.PlaneGeometry(sw, sd), floorMat);
      s.rotation.x = -Math.PI / 2;
      s.position.set((cut.xMin + cut.xMax) / 2, 0, (-D/2 + cut.zMin) / 2);
      s.receiveShadow = true;
      floorGroup.add(s);
    }
    // Strip 4: East of cutout (if cutout doesn't reach east wall)
    if (cut.xMin > -W/2) {
      const sw = cut.xMin - (-W/2);
      const s = new THREE.Mesh(new THREE.PlaneGeometry(sw, D), floorMat);
      s.rotation.x = -Math.PI / 2;
      s.position.set((-W/2 + cut.xMin) / 2, 0, 0);
      s.receiveShadow = true;
      floorGroup.add(s);
    }
    floor = floorGroup;
    group.add(floorGroup);
  } else {
    const floorGeo = new THREE.PlaneGeometry(W, D);
    floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -H / 2;
    floor.receiveShadow = true;
    group.add(floor);
  }

  // 4 Walls — each with an outward normal for smart visibility
  // If room has wallOpenings, use createWallWithOpenings for those walls
  const wallOpacity = 0.3;
  const wo = room.wallOpenings || {};

  const skip = new Set(room.skipWalls || []);
  const wallDefs = [
    { key: 'back',  build: () => wo.back
      ? createWallWithOpenings(W, H, wo.back, 0, 0, -D/2, 0, wallColor, wallOpacity, new THREE.Vector3(0,0,-1))
      : createWall(W, H, 0, 0, -D/2, 0, wallColor, wallOpacity, new THREE.Vector3(0, 0, -1)) },
    { key: 'front', build: () => wo.front
      ? createWallWithOpenings(W, H, wo.front, 0, 0, D/2, 0, wallColor, wallOpacity, new THREE.Vector3(0,0,1))
      : createWall(W, H, 0, 0, D/2, 0, wallColor, wallOpacity, new THREE.Vector3(0, 0, 1)) },
    { key: 'left',  build: () => wo.left
      ? createWallWithOpenings(D, H, wo.left, -W/2, 0, 0, Math.PI/2, wallColor, wallOpacity, new THREE.Vector3(-1,0,0))
      : createWall(D, H, -W/2, 0, 0, Math.PI/2, wallColor, wallOpacity, new THREE.Vector3(-1, 0, 0)) },
    { key: 'right', build: () => wo.right
      ? createWallWithOpenings(D, H, wo.right, W/2, 0, 0, Math.PI/2, wallColor, wallOpacity, new THREE.Vector3(1,0,0))
      : createWall(D, H, W/2, 0, 0, Math.PI/2, wallColor, wallOpacity, new THREE.Vector3(1, 0, 0)) },
  ];
  wallDefs.forEach(({ key, build }) => {
    if (skip.has(key)) return; // skip this wall entirely
    const w = build();
    w.userData._roomPos = new THREE.Vector3(room.pos_x, room.pos_y, room.pos_z);
    group.add(w);
    wallMeshes.push(w);
    roomWalls.push(w);
  });

  // A-frame gable on the north (front/+z) wall — triangle above the rectangular wall
  if (room.aframeGable) {
    const apexY = room.aframeApexY || (H / 2 + 1.5);  // local Y of peak
    const wallTopY = H / 2;   // top of rectangular wall
    // Triangle: left corner (-W/2, wallTopY, D/2), right corner (W/2, wallTopY, D/2), apex (0, apexY, D/2)
    const triShape = new THREE.Shape();
    triShape.moveTo(-W / 2, wallTopY);
    triShape.lineTo(W / 2, wallTopY);
    triShape.lineTo(0, apexY);
    triShape.closePath();
    const triGeo = new THREE.ShapeGeometry(triShape);
    const triMat = new THREE.MeshStandardMaterial({
      color: wallColor, transparent: true, opacity: wallOpacity,
      side: THREE.DoubleSide,
    });
    const triMesh = new THREE.Mesh(triGeo, triMat);
    triMesh.position.z = D / 2;  // north wall position
    triMesh.userData._outwardNormal = new THREE.Vector3(0, 0, 1);
    triMesh.userData._roomPos = new THREE.Vector3(room.pos_x, room.pos_y, room.pos_z);
    group.add(triMesh);
    wallMeshes.push(triMesh);
    roomWalls.push(triMesh);
    // A-frame edge outline
    const gableEdgePts = [
      new THREE.Vector3(-W / 2, wallTopY, D / 2),
      new THREE.Vector3(0, apexY, D / 2),
      new THREE.Vector3(W / 2, wallTopY, D / 2),
    ];
    const gableEdge = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(gableEdgePts),
      new THREE.LineBasicMaterial({ color: 0x90caf9 })
    );
    group.add(gableEdge);
  }

  // Ceiling — very subtle (skip if noCeiling flag is set)
  let ceil = null;
  if (!room.noCeiling) {
    const ceilGeo = new THREE.PlaneGeometry(W, D);
    const ceilMat = new THREE.MeshStandardMaterial({
      color: wallColor, transparent: true, opacity: 0.06,
      side: THREE.DoubleSide,
      polygonOffset: true,
      polygonOffsetFactor: -2,
      polygonOffsetUnits: -2,
    });
    ceil = new THREE.Mesh(ceilGeo, ceilMat);
    ceil.rotation.x = Math.PI / 2;
    ceil.position.y = H / 2;
    group.add(ceil);
    wallMeshes.push(ceil);
  }

  // Edges — bright wireframe (with gaps for wall openings)
  const edgeMat = new THREE.LineBasicMaterial({
    color: c.clone().multiplyScalar(1.5),
    transparent: true, opacity: 0.6,
  });
  const wo2 = room.wallOpenings || {};
  const hasOpenings = Object.keys(wo2).length > 0;
  const hasSkipWalls = skip.size > 0;
  let edgeLines;
  if (!hasOpenings && !hasSkipWalls) {
    // No openings and no skipped walls: draw full box wireframe
    const boxGeo = new THREE.BoxGeometry(W, H, D);
    const edges = new THREE.EdgesGeometry(boxGeo);
    edgeLines = new THREE.LineSegments(edges, edgeMat);
  } else {
    // Has openings or skipped walls: draw edges selectively
    edgeLines = new THREE.Group();
    // Floor edges — each side is a separate segment so we can skip removed walls
    // back(-z/south): SW→SE, front(+z/north): NE→NW, left(-x/east): SE→NE, right(+x/west): NW→SW
    const floorEdges = [
      { key: 'back',  pts: [new THREE.Vector3(-W/2,-H/2,-D/2), new THREE.Vector3(W/2,-H/2,-D/2)] },
      { key: 'right', pts: [new THREE.Vector3(W/2,-H/2,-D/2), new THREE.Vector3(W/2,-H/2,D/2)] },
      { key: 'front', pts: [new THREE.Vector3(W/2,-H/2,D/2), new THREE.Vector3(-W/2,-H/2,D/2)] },
      { key: 'left',  pts: [new THREE.Vector3(-W/2,-H/2,D/2), new THREE.Vector3(-W/2,-H/2,-D/2)] },
    ];
    floorEdges.forEach(({ key, pts }) => {
      if (!skip.has(key)) {
        edgeLines.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), edgeMat));
      }
    });
    // Ceiling rectangle edges (skip if noCeiling)
    if (!room.noCeiling) {
      floorEdges.forEach(({ key, pts }) => {
        if (!skip.has(key)) {
          const ceilPts = pts.map(p => new THREE.Vector3(p.x, H/2, p.z));
          edgeLines.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ceilPts), edgeMat));
        }
      });
    }
    // 4 vertical corner lines — only draw if BOTH adjacent walls exist
    // corners: SW(-W/2,-D/2)=left+back, SE(W/2,-D/2)=right+back, NE(W/2,D/2)=right+front, NW(-W/2,D/2)=left+front
    const cornerAdj = [
      { cx: -W/2, cz: -D/2, adj: ['left','back'] },
      { cx: W/2,  cz: -D/2, adj: ['right','back'] },
      { cx: W/2,  cz: D/2,  adj: ['right','front'] },
      { cx: -W/2, cz: D/2,  adj: ['left','front'] },
    ];
    const topY = room.noCeiling ? H/4 : H/2;
    cornerAdj.forEach(({ cx, cz, adj }) => {
      // Draw corner post if at least one adjacent wall exists
      if (!skip.has(adj[0]) || !skip.has(adj[1])) {
        const pts = [new THREE.Vector3(cx,-H/2,cz), new THREE.Vector3(cx, topY, cz)];
        edgeLines.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), edgeMat));
      }
    });
  }
  group.add(edgeLines);

  // Room label (billboard)
  const labelSprite = makeLabel(room.name, 52, '#ffffff');
  labelSprite.position.y = H / 2 + 0.7;
  labelSprite.scale.set(3, 0.8, 1);
  group.add(labelSprite);

  // Item count sublabel
  const totalItems = room.furniture.reduce((s, f) => s + f.items.length, 0);
  const countSprite = makeLabel(totalItems + ' items', 30, '#7c81a0');
  countSprite.position.y = H / 2 + 0.25;
  countSprite.scale.set(2, 0.5, 1);
  group.add(countSprite);

  // ---- FURNITURE ----
  room.furniture.forEach(furn => {
    const fGroup = new THREE.Group();
    fGroup.position.set(furn.x, furn.y, furn.z);
    if (furn.rotY) fGroup.rotation.y = furn.rotY;

    const furnColor = new THREE.Color(furn.color);
    const fw = furn.w, fh = furn.h, fd = furn.d;

    if (furn.type === 'staircase') {
      // Render as actual steps going up
      const stepCount = Math.max(4, Math.round(fd / 0.28));
      const stepH = fh / stepCount;
      const stepD = fd / stepCount;
      const stepMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.6, metalness: 0.1,
        transparent: true, opacity: 0.85,
      });
      const railMat = new THREE.MeshStandardMaterial({
        color: 0x333333, roughness: 0.4, metalness: 0.6,
        transparent: true, opacity: 0.8,
      });
      for (let i = 0; i < stepCount; i++) {
        // Each step: full width, thin, positioned progressively higher and deeper
        const sGeo = new THREE.BoxGeometry(fw, stepH * 0.6, stepD * 0.95);
        const step = new THREE.Mesh(sGeo, stepMat);
        step.position.set(0, -fh/2 + stepH * i + stepH * 0.3, -fd/2 + stepD * i + stepD/2);
        step.castShadow = true;
        fGroup.add(step);
      }
      // Railing on one side (wrought iron style - thin dark posts)
      const railPostCount = Math.min(8, Math.floor(stepCount / 2));
      for (let i = 0; i <= railPostCount; i++) {
        const t = i / railPostCount;
        const postH = 1.0;
        const postGeo = new THREE.BoxGeometry(0.03, postH, 0.03);
        const post = new THREE.Mesh(postGeo, railMat);
        post.position.set(
          fw/2 - 0.05,
          -fh/2 + fh * t + postH/2,
          -fd/2 + fd * t
        );
        fGroup.add(post);
      }
      // Top rail
      const railLen = Math.sqrt(fh*fh + fd*fd);
      const railGeo = new THREE.BoxGeometry(0.05, 0.04, railLen);
      const rail = new THREE.Mesh(railGeo, new THREE.MeshStandardMaterial({
        color: 0xc4a35a, roughness: 0.4, metalness: 0.2,
      }));
      rail.position.set(fw/2 - 0.05, 0, 0);
      rail.rotation.x = -Math.atan2(fh, fd);
      fGroup.add(rail);

    } else if (furn.type === 'chair') {
      // Chair: seat + backrest + 4 legs
      const woodMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.6, metalness: 0.1,
        transparent: true, opacity: 0.9,
      });
      const seatThick = 0.04;
      const seatH = fh * 0.45; // seat height is ~45% of total chair height
      const legH = seatH - seatThick/2;
      // Seat
      const seatGeo = new THREE.BoxGeometry(fw * 0.9, seatThick, fd * 0.9);
      const seat = new THREE.Mesh(seatGeo, woodMat);
      seat.position.y = -fh/2 + seatH;
      seat.castShadow = true;
      fGroup.add(seat);
      // Backrest
      const backGeo = new THREE.BoxGeometry(fw * 0.85, fh * 0.5, 0.04);
      const back = new THREE.Mesh(backGeo, woodMat);
      back.position.set(0, -fh/2 + seatH + fh * 0.25, -fd * 0.4);
      back.castShadow = true;
      fGroup.add(back);
      // 4 Legs
      const legGeo = new THREE.BoxGeometry(0.04, legH, 0.04);
      const legOffsets = [
        [-fw * 0.38, -fd * 0.38],
        [fw * 0.38, -fd * 0.38],
        [-fw * 0.38, fd * 0.38],
        [fw * 0.38, fd * 0.38],
      ];
      legOffsets.forEach(([lx, lz]) => {
        const leg = new THREE.Mesh(legGeo, woodMat);
        leg.position.set(lx, -fh/2 + legH/2, lz);
        fGroup.add(leg);
      });

    } else if (furn.type === 'cabinet' || furn.type === 'box') {
      const bodyMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.7, metalness: 0.1,
        transparent: true, opacity: 0.85, side: THREE.DoubleSide,
      });

      if (furn.doorFace) {
        // Build from 5 individual planes, skipping the door face
        // doorFace: "+z"(north), "-z"(south), "+x"(west), "-x"(east)
        const hw = fw/2, hh = fh/2, hd = fd/2;
        const faces = [
          { id: "+z", geo: [fw, fh], pos: [0, 0, hd], rot: [0, 0, 0] },       // north
          { id: "-z", geo: [fw, fh], pos: [0, 0, -hd], rot: [0, 0, 0] },      // south
          { id: "+x", geo: [fd, fh], pos: [hw, 0, 0], rot: [0, Math.PI/2, 0] },  // west
          { id: "-x", geo: [fd, fh], pos: [-hw, 0, 0], rot: [0, Math.PI/2, 0] }, // east
          { id: "+y", geo: [fw, fd], pos: [0, hh, 0], rot: [Math.PI/2, 0, 0] },  // top
          { id: "-y", geo: [fw, fd], pos: [0, -hh, 0], rot: [Math.PI/2, 0, 0] }, // bottom
        ];
        faces.forEach(f => {
          if (f.id === furn.doorFace) return; // skip door face
          const geo = new THREE.PlaneGeometry(f.geo[0], f.geo[1]);
          const mesh = new THREE.Mesh(geo, bodyMat.clone());
          mesh.position.set(f.pos[0], f.pos[1], f.pos[2]);
          mesh.rotation.set(f.rot[0], f.rot[1], f.rot[2]);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          fGroup.add(mesh);
        });
        // Door frame outline (bright blue like wall openings)
        const doorLineMat = new THREE.LineBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.8 });
        const df = furn.doorFace;
        let doorPts = [];
        if (df === "+z" || df === "-z") {
          const zp = df === "+z" ? hd + 0.02 : -hd - 0.02;
          doorPts = [
            new THREE.Vector3(-hw, -hh, zp), new THREE.Vector3(-hw, hh, zp),
            new THREE.Vector3(hw, hh, zp), new THREE.Vector3(hw, -hh, zp),
            new THREE.Vector3(-hw, -hh, zp),
          ];
        } else if (df === "+x" || df === "-x") {
          const xp = df === "+x" ? hw + 0.02 : -hw - 0.02;
          doorPts = [
            new THREE.Vector3(xp, -hh, -hd), new THREE.Vector3(xp, hh, -hd),
            new THREE.Vector3(xp, hh, hd), new THREE.Vector3(xp, -hh, hd),
            new THREE.Vector3(xp, -hh, -hd),
          ];
        }
        if (doorPts.length) {
          fGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(doorPts), doorLineMat));
        }
      } else {
        // Standard solid box
        const bodyGeo = new THREE.BoxGeometry(fw, fh, fd);
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        fGroup.add(body);
        // Edges for definition
        const fEdges = new THREE.EdgesGeometry(bodyGeo);
        const fEdgeMat = new THREE.LineBasicMaterial({
          color: furnColor.clone().multiplyScalar(1.8),
          transparent: true, opacity: 0.4,
        });
        fGroup.add(new THREE.LineSegments(fEdges, fEdgeMat));
      }

      // Shelves inside cabinets (skip for doorFace closets — top/bottom are already planes)
      if (furn.type === 'cabinet' && fh > 0.6 && !furn.doorFace) {
        const shelfCount = Math.floor(fh / 0.4);
        for (let s = 1; s < shelfCount; s++) {
          const shelfGeo = new THREE.PlaneGeometry(fw - 0.04, fd - 0.04);
          const shelfMat = new THREE.MeshStandardMaterial({
            color: furnColor.clone().multiplyScalar(0.7),
            side: THREE.DoubleSide, transparent: true, opacity: 0.5,
          });
          const shelf = new THREE.Mesh(shelfGeo, shelfMat);
          shelf.rotation.x = -Math.PI / 2;
          shelf.position.y = -fh / 2 + (s * fh / shelfCount);
          fGroup.add(shelf);
        }
      }

      // Box label on front face
      if (furn.type === 'box') {
        // Tape strip across top
        const tapeGeo = new THREE.PlaneGeometry(fw * 0.7, 0.03);
        const tapeMat = new THREE.MeshBasicMaterial({ color: 0xccb97e, transparent: true, opacity: 0.7 });
        const tape = new THREE.Mesh(tapeGeo, tapeMat);
        tape.position.y = fh / 2 + 0.002;
        tape.rotation.x = -Math.PI / 2;
        fGroup.add(tape);

        // Small label on front
        const boxLabel = makeLabel(furn.name, 28, '#ffffff', '#5d4037');
        boxLabel.position.z = fd / 2 + 0.05;
        boxLabel.position.y = 0;
        boxLabel.scale.set(fw * 0.9, fh * 0.4, 1);
        fGroup.add(boxLabel);
      }
    } else if (furn.type === 'shelf') {
      // Open shelving - just vertical and horizontal bars
      const barMat = new THREE.MeshStandardMaterial({ color: furnColor, roughness: 0.6, metalness: 0.2 });
      // Verticals
      const vGeo = new THREE.BoxGeometry(0.04, fh, 0.04);
      [-fw/2, fw/2].forEach(x => {
        [-fd/2, fd/2].forEach(z => {
          const vert = new THREE.Mesh(vGeo, barMat);
          vert.position.set(x, 0, z);
          vert.castShadow = true;
          fGroup.add(vert);
        });
      });
      // Horizontal shelves
      const shelfCount = Math.max(2, Math.floor(fh / 0.5));
      for (let s = 0; s <= shelfCount; s++) {
        const sGeo = new THREE.BoxGeometry(fw, 0.03, fd);
        const sMesh = new THREE.Mesh(sGeo, barMat);
        sMesh.position.y = -fh/2 + s * (fh / shelfCount);
        sMesh.castShadow = true;
        fGroup.add(sMesh);
      }
    } else if (furn.type === 'toilet') {
      // Toilet: tank (box against wall) + bowl (rounded shape) + seat (torus-like)
      const porcelain = new THREE.MeshStandardMaterial({
        color: 0xf0f0f0, roughness: 0.3, metalness: 0.05,
        transparent: true, opacity: 0.95,
      });
      const porcelainEdge = new THREE.MeshStandardMaterial({
        color: 0xe0e0e0, roughness: 0.3, metalness: 0.05,
      });

      // === TOILET: tank against wall (+z/north), bowl facing out (-z/south) ===
      // Tank sits higher, bowl sits lower, connected by a tapered transition piece

      // === TOILET: single connected piece from floor to tank ===
      // Tank against wall (+z), bowl extends forward (-z), all connected

      // Dimensions
      const tankW = fw * 0.75, tankH = fh * 0.35, tankD = fd * 0.2;
      const bowlR = Math.min(fw, fd) * 0.36;
      const seatTopY = -fh/2 + fh * 0.52;  // where seat rim sits
      const tankBotY = seatTopY - 0.02;      // tank starts just below seat level
      const tankTopY = tankBotY + tankH;

      // 1. Base/pedestal — tapered cylinder from floor to seat height
      const baseH = seatTopY - (-fh/2);
      const baseGeo = new THREE.CylinderGeometry(bowlR * 0.7, bowlR * 0.4, baseH, 16);
      const base = new THREE.Mesh(baseGeo, porcelain);
      base.position.set(0, -fh/2 + baseH/2, -fd * 0.05);
      base.castShadow = true;
      fGroup.add(base);

      // 2. Tank (box, against wall at +z)
      const tankGeo = new THREE.BoxGeometry(tankW, tankH, tankD);
      const tank = new THREE.Mesh(tankGeo, porcelain);
      tank.position.set(0, tankBotY + tankH/2, fd/2 - tankD/2);
      tank.castShadow = true;
      fGroup.add(tank);

      // 3. Bridge connecting pedestal top to tank (fills the gap)
      const bridgeW = tankW * 0.65;
      const bridgeH = tankH * 0.4;
      const bridgeD = fd/2 - tankD - (-fd * 0.05 + bowlR * 0.7); // span from pedestal back to tank front
      const bridgeZ = (-fd * 0.05 + bowlR * 0.35) + bridgeD / 2;
      const bridgeGeo = new THREE.BoxGeometry(bridgeW, bridgeH, Math.max(bridgeD, 0.05));
      const bridge = new THREE.Mesh(bridgeGeo, porcelain);
      bridge.position.set(0, seatTopY - bridgeH/2, bridgeZ);
      fGroup.add(bridge);

      // 4. Seat rim (torus)
      const seatR = bowlR * 0.65;
      const tubeR = 0.025;
      const seatGeo = new THREE.TorusGeometry(seatR, tubeR, 8, 24);
      const seat = new THREE.Mesh(seatGeo, porcelain);
      seat.rotation.x = -Math.PI / 2;
      seat.position.set(0, seatTopY, -fd * 0.05);
      fGroup.add(seat);

      // 5. Lid (flat disc on seat)
      const lidGeo = new THREE.CylinderGeometry(seatR * 0.92, seatR * 0.92, 0.012, 24);
      const lid = new THREE.Mesh(lidGeo, porcelain);
      lid.position.set(0, seatTopY + 0.01, -fd * 0.05);
      fGroup.add(lid);

      // 6. Flush handle
      const handleGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.03, 8);
      const handle = new THREE.Mesh(handleGeo, porcelainEdge);
      handle.position.set(tankW * 0.3, tankTopY + 0.015, fd/2 - tankD/2);
      fGroup.add(handle);

    } else if (furn.type === 'cylinder') {
      // Cylinder (trash cans, planters, etc.)
      const radius = Math.min(fw, fd) / 2;
      const cylGeo = new THREE.CylinderGeometry(radius, radius, fh, 20);
      const cylMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.5, metalness: 0.3,
        transparent: true, opacity: 0.9,
      });
      const cyl = new THREE.Mesh(cylGeo, cylMat);
      cyl.castShadow = true;
      fGroup.add(cyl);
      // Lid ring
      const lidGeo = new THREE.CylinderGeometry(radius * 1.05, radius * 1.05, 0.02, 20);
      const lid = new THREE.Mesh(lidGeo, cylMat);
      lid.position.y = fh / 2;
      fGroup.add(lid);

    } else if (furn.type === 'round-table') {
      // Circular table: disc top + central pedestal or 4 legs
      const tMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.6, metalness: 0.1,
        transparent: true, opacity: 0.9,
      });
      const tableR = Math.min(fw, fd) / 2;
      const topThick = 0.05;
      const topY = fh / 2 - topThick / 2;
      // Circular top
      const topGeo = new THREE.CylinderGeometry(tableR, tableR, topThick, 24);
      const top = new THREE.Mesh(topGeo, tMat);
      top.position.y = topY;
      top.castShadow = true;
      fGroup.add(top);
      // 4 legs
      const legH = fh - topThick;
      const legGeo = new THREE.CylinderGeometry(0.03, 0.03, legH, 8);
      const legR = tableR * 0.7;
      for (let li = 0; li < 4; li++) {
        const ang = (li / 4) * Math.PI * 2 + Math.PI / 4;
        const leg = new THREE.Mesh(legGeo, tMat);
        leg.position.set(Math.cos(ang) * legR, -topThick / 2, Math.sin(ang) * legR);
        fGroup.add(leg);
      }

    } else if (furn.type === 'grill') {
      // BBQ grill: firebox body + dome lid + 4 legs + side handle
      const metalMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.3, metalness: 0.6,
        transparent: true, opacity: 0.9,
      });
      const grateColor = new THREE.Color(0x555555);
      const grateMat = new THREE.MeshStandardMaterial({
        color: grateColor, roughness: 0.4, metalness: 0.5,
        transparent: true, opacity: 0.9,
      });
      // Firebox (main body)
      const boxH = fh * 0.35;
      const boxY = fh * 0.05; // slightly above center-bottom
      const boxGeo = new THREE.BoxGeometry(fw * 0.9, boxH, fd * 0.85);
      const box = new THREE.Mesh(boxGeo, metalMat);
      box.position.y = boxY;
      box.castShadow = true;
      fGroup.add(box);
      // Dome lid (half-cylinder)
      const lidH = fh * 0.25;
      const lidR = fw * 0.45;
      const lidGeo = new THREE.CylinderGeometry(lidR, lidR, fd * 0.85, 16, 1, false, 0, Math.PI);
      const lid = new THREE.Mesh(lidGeo, metalMat);
      lid.rotation.z = Math.PI / 2;
      lid.rotation.y = Math.PI / 2;
      lid.position.y = boxY + boxH / 2 + lidR * 0.3;
      lid.castShadow = true;
      fGroup.add(lid);
      // Lid handle
      const handleGeo = new THREE.CylinderGeometry(0.015, 0.015, fw * 0.3, 8);
      const handle = new THREE.Mesh(handleGeo, grateMat);
      handle.position.y = boxY + boxH / 2 + lidR * 0.7;
      fGroup.add(handle);
      // 4 Legs
      const legH = fh * 0.35;
      const legGeo = new THREE.CylinderGeometry(0.025, 0.025, legH, 8);
      const legPositions = [
        [-fw * 0.35, -fd * 0.35], [fw * 0.35, -fd * 0.35],
        [-fw * 0.35, fd * 0.35], [fw * 0.35, fd * 0.35],
      ];
      legPositions.forEach(([lx, lz]) => {
        const leg = new THREE.Mesh(legGeo, metalMat);
        leg.position.set(lx, -fh / 2 + legH / 2, lz);
        fGroup.add(leg);
      });
      // Grill grate lines on top
      const grateY = boxY + boxH / 2 + 0.01;
      for (let gi = -3; gi <= 3; gi++) {
        const barGeo = new THREE.BoxGeometry(fw * 0.8, 0.01, 0.015);
        const bar = new THREE.Mesh(barGeo, grateMat);
        bar.position.set(0, grateY, gi * fd * 0.1);
        fGroup.add(bar);
      }

    } else if (furn.type === 'stringlight') {
      // Diagonal string light line from (x1,y1,z1) to (x2,y2,z2) in local room coords
      const x1 = furn.x1 || 0, y1 = furn.y1 || 0, z1 = furn.z1 || 0;
      const x2 = furn.x2 || 0, y2 = furn.y2 || 0, z2 = furn.z2 || 0;
      const pts = [new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y2, z2)];
      const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
      const lineMat = new THREE.LineBasicMaterial({ color: furnColor, linewidth: 2 });
      const line = new THREE.Line(lineGeo, lineMat);
      fGroup.add(line);
      // Small bulb spheres along the line
      const bulbGeo = new THREE.SphereGeometry(0.04, 8, 8);
      const bulbMat = new THREE.MeshStandardMaterial({
        color: 0xfff59d, emissive: 0xfff59d, emissiveIntensity: 0.5,
        transparent: true, opacity: 0.9,
      });
      const numBulbs = 10;
      for (let bi = 0; bi <= numBulbs; bi++) {
        const t = bi / numBulbs;
        const bx = x1 + (x2 - x1) * t;
        const by = y1 + (y2 - y1) * t - Math.sin(t * Math.PI) * 0.15; // slight droop
        const bz = z1 + (z2 - z1) * t;
        const bulb = new THREE.Mesh(bulbGeo, bulbMat);
        bulb.position.set(bx, by, bz);
        fGroup.add(bulb);
      }
      // Override position — stringlight handles its own local coords
      fGroup.position.set(0, 0, 0);

    } else if (furn.type === 'appliance') {
      // Solid block with slightly different shading
      const bodyGeo = new THREE.BoxGeometry(fw, fh, fd);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.5, metalness: 0.3,
        transparent: true, opacity: 0.9,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      fGroup.add(body);
      const fEdges = new THREE.EdgesGeometry(bodyGeo);
      fGroup.add(new THREE.LineSegments(fEdges, new THREE.LineBasicMaterial({
        color: furnColor.clone().multiplyScalar(1.5), transparent: true, opacity: 0.3,
      })));
    }

    // Furniture label (smaller)
    if (furn.items.length > 0) {
      const byOff = furn.badgeOffsetY || 0;
      const bxOff = furn.badgeOffsetX || 0;
      const bzOff = furn.badgeOffsetZ || 0;
      const fLabel = makeLabel(furn.name, 22, '#b0b3c8');
      fLabel.position.set(bxOff, furn.h / 2 + 0.2 + byOff, bzOff);
      fLabel.scale.set(1.4, 0.35, 1);
      fGroup.add(fLabel);

      // Neon item count badge — floats above the label, clickable
      const badge = makeBadge(furn.items.length, '#00e5ff');
      badge.position.set(bxOff, furn.h / 2 + 0.55 + byOff, bzOff);
      badge.scale.set(0.5, 0.5, 1);
      badge.userData._isBadge = true;
      fGroup.add(badge);
    }

    group.add(fGroup);

    const furnId = room.id + '_' + furn.name.replace(/\s/g, '_');

    // Simple rule: if nothing is stored in it, it's decorative furniture (toggleable)
    const isDecorativeFurniture = furn.items.length === 0;

    furnitureMeshes[furnId] = {
      group: fGroup, room, furn, roomGroup: group,
      walls: roomWalls,
      isDecorativeFurniture,
    };
  });

  // Glow mesh (for search highlighting)
  const glowGeo = new THREE.BoxGeometry(W + 0.4, H + 0.4, D + 0.4);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xf5a623, transparent: true, opacity: 0, side: THREE.BackSide,
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  glowMesh.visible = false;
  group.add(glowMesh);

  scene.add(group);
  roomGroups[room.id] = { group, floor, edgeLines, edgeMat, glowMesh, room, walls: roomWalls, ceil };
});

// ---- LABEL HELPER ----
function makeLabel(text, fontSize, textColor, bgColor) {
  const cvs = document.createElement('canvas');
  const ctx = cvs.getContext('2d');
  cvs.width = 512; cvs.height = 128;
  if (bgColor) {
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(180, 24, 152, 80, 16);
    ctx.fill();
  }
  ctx.font = `bold ${fontSize || 42}px Inter, -apple-system, sans-serif`;
  ctx.fillStyle = textColor || '#e8eaf2';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  return new THREE.Sprite(mat);
}

// ---- BADGE HELPER (neon circle with count) ----
function makeBadge(count, glowColor) {
  const size = 256;
  const cvs = document.createElement('canvas');
  const ctx = cvs.getContext('2d');
  cvs.width = size; cvs.height = size;
  const cx = size / 2, cy = size / 2, r = size * 0.38;

  // Outer neon glow (blurred circle)
  ctx.save();
  ctx.shadowColor = glowColor || '#00e5ff';
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = glowColor || '#00e5ff';
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.restore();

  // Dark filled interior
  ctx.beginPath();
  ctx.arc(cx, cy, r - 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(10, 14, 28, 0.92)';
  ctx.fill();

  // Crisp neon border ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = glowColor || '#00e5ff';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Inner subtle ring for depth
  ctx.beginPath();
  ctx.arc(cx, cy, r - 6, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Number text — big, bold, bright
  ctx.font = `bold ${count >= 10 ? 72 : 88}px Inter, -apple-system, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(count + '', cx, cy + 2);

  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    sizeAttenuation: true,
  });
  return new THREE.Sprite(mat);
}

// ---- URL STATE PERSISTENCE ----
// Stores camera spherical (radius, phi, theta) + target (x, y, z) in URL hash
// so refreshing or sharing a link preserves the exact view.
function readStateFromURL() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try {
    const params = new URLSearchParams(hash);
    const r = parseFloat(params.get('r'));
    const p = parseFloat(params.get('p'));
    const t = parseFloat(params.get('t'));
    const tx = parseFloat(params.get('tx'));
    const ty = parseFloat(params.get('ty'));
    const tz = parseFloat(params.get('tz'));
    if ([r, p, t, tx, ty, tz].some(isNaN)) return null;
    return { radius: r, phi: p, theta: t, targetX: tx, targetY: ty, targetZ: tz };
  } catch (e) { return null; }
}

let _urlUpdateTimer = null;
function writeStateToURL() {
  // Debounce: update URL at most every 300ms to avoid spamming history
  if (_urlUpdateTimer) clearTimeout(_urlUpdateTimer);
  _urlUpdateTimer = setTimeout(() => {
    const params = new URLSearchParams();
    params.set('r', spherical.radius.toFixed(2));
    params.set('p', spherical.phi.toFixed(4));
    params.set('t', spherical.theta.toFixed(4));
    params.set('tx', target.x.toFixed(2));
    params.set('ty', target.y.toFixed(2));
    params.set('tz', target.z.toFixed(2));
    // Use replaceState to avoid polluting browser history with every drag
    history.replaceState(null, '', '#' + params.toString());
  }, 300);
}

// ---- ORBIT CONTROLS ----
const defaultSph = { radius: 30, phi: Math.PI / 5, theta: Math.PI / 5 };
const defaultTarget = { x: 4, y: -0.5, z: 2 };
const urlState = readStateFromURL();

let spherical = new THREE.Spherical(
  urlState ? urlState.radius : defaultSph.radius,
  urlState ? urlState.phi : defaultSph.phi,
  urlState ? urlState.theta : defaultSph.theta
);
let target = new THREE.Vector3(
  urlState ? urlState.targetX : defaultTarget.x,
  urlState ? urlState.targetY : defaultTarget.y,
  urlState ? urlState.targetZ : defaultTarget.z
);
let isDragging = false, isRightDragging = false;
let prevMouse = { x: 0, y: 0 };

function updateCamera() {
  camera.position.setFromSpherical(spherical).add(target);
  camera.lookAt(target);
  writeStateToURL();
}
updateCamera();

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) { isRightDragging = true; }
  else { isDragging = true; }
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => { isDragging = false; isRightDragging = false; });
window.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  if (isDragging) {
    spherical.theta -= dx * 0.004;
    spherical.phi = Math.max(0.15, Math.min(Math.PI / 2 - 0.05, spherical.phi - dy * 0.004));
    updateCamera();
  }
  if (isRightDragging) {
    const panSpeed = spherical.radius * 0.002;
    const right = new THREE.Vector3();
    right.setFromMatrixColumn(camera.matrix, 0);
    const up = new THREE.Vector3(0, 1, 0);
    target.addScaledVector(right, -dx * panSpeed);
    target.addScaledVector(up, dy * panSpeed);
    updateCamera();
  }
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = 1 + e.deltaY * 0.001;
  const oldRadius = spherical.radius;
  const newRadius = Math.max(5, Math.min(60, spherical.radius * factor));
  spherical.radius = newRadius;
  // Zoom toward cursor: raycast from mouse to a world-space plane,
  // then shift orbit target toward that point so zoom follows the cursor
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  const zoomRaycaster = new THREE.Raycaster();
  zoomRaycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -target.y);
  const hitPoint = new THREE.Vector3();
  if (zoomRaycaster.ray.intersectPlane(plane, hitPoint)) {
    // zoomRatio is positive when zooming in (radius shrinking), negative zooming out
    const zoomRatio = 1 - newRadius / oldRadius;
    // Stronger factor: 0.15 per scroll step, so ~15% shift toward cursor each tick
    const lerpAmount = Math.abs(zoomRatio) * 1.5;
    if (zoomRatio > 0) {
      // Zooming in: move target toward cursor
      target.lerp(hitPoint, Math.min(lerpAmount, 0.25));
    } else {
      // Zooming out: move target slightly away from cursor (back toward center)
      target.lerp(hitPoint, -Math.min(lerpAmount, 0.1));
    }
  }
  updateCamera();
}, { passive: false });

// ---- FLY-TO ----
let flyAnim = null;
let flyAnimCallback = null; // callback after fly-to completes
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

function animateCameraTo(newSph, newTarget, onComplete) {
  flyAnim = {
    startTarget: target.clone(), endTarget: newTarget || target.clone(),
    startSph: spherical.clone(), endSph: newSph,
    progress: 0,
  };
  flyAnimCallback = onComplete || null;
}

function flyToRoom(roomId, onComplete) {
  const rg = roomGroups[roomId];
  if (!rg) return;
  const r = rg.room;
  const dist = Math.max(r.width, r.depth) * 2.2;
  animateCameraTo(
    new THREE.Spherical(dist, Math.PI / 4, spherical.theta),
    new THREE.Vector3(r.pos_x, r.pos_y, r.pos_z),
    onComplete
  );
}

function flyToFurniture(furnId, onComplete) {
  const fm = furnitureMeshes[furnId];
  if (!fm) return;
  const r = fm.room;
  const f = fm.furn;
  const worldPos = new THREE.Vector3(r.pos_x + f.x, r.pos_y + f.y, r.pos_z + f.z);
  const dist = Math.max(f.w, f.h, f.d) * 5;
  animateCameraTo(
    new THREE.Spherical(Math.max(dist, 4), Math.PI / 4, spherical.theta),
    worldPos,
    onComplete
  );
}

// ---- CLICK DETECTION ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let activeFlyout = null;

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check furniture and badges (sprites)
  const allFurnObjs = [];
  Object.entries(furnitureMeshes).forEach(([id, fm]) => {
    fm.group.traverse(child => {
      if (child.isMesh || child.isSprite) {
        child.userData._furnId = id;
        allFurnObjs.push(child);
      }
    });
  });

  const hits = raycaster.intersectObjects(allFurnObjs);
  if (hits.length > 0) {
    const furnId = hits[0].object.userData._furnId;
    if (furnId) {
      showFlyout(furnId, e.clientX, e.clientY);
      return;
    }
  }

  // Check room fills (floor click)
  const roomFloors = Object.values(roomGroups).map(rg => rg.floor);
  const roomHits = raycaster.intersectObjects(roomFloors);
  if (roomHits.length > 0) {
    const entry = Object.values(roomGroups).find(rg => rg.floor === roomHits[0].object);
    if (entry) {
      setActiveRoom(entry.room.id);
      flyToRoom(entry.room.id);
      // Notify parent (if in iframe)
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'roomClicked', roomId: entry.room.id }, '*');
      }
    }
    closeFlyout();
    return;
  }

  closeFlyout();
});

// ---- FLYOUT SYSTEM ----
function showFlyout(furnId, clientX, clientY) {
  const fm = furnitureMeshes[furnId];
  if (!fm || fm.furn.items.length === 0) return;

  activeFlyout = { furnId, fm };
  const flyoutEl = document.getElementById('flyout');

  const isHighlighted = (name) => highlightedItemNames.has(name.toLowerCase());
  const category = fm.furn.category || '';
  const itemsHtml = fm.furn.items.map(item => `
    <li>
      <span class="flyout-dot ${isHighlighted(item.name) ? 'highlight' : ''}"></span>
      <span>
        <span style="font-weight:600">${item.name}</span>
        <div class="flyout-item-loc">${item.location}</div>
      </span>
    </li>
  `).join('');

  flyoutEl.innerHTML = `
    <button class="flyout-close" onclick="closeFlyout()">&times;</button>
    <div class="flyout-title">${fm.furn.name}</div>
    <div class="flyout-subtitle">${fm.room.name} &middot; ${fm.furn.items.length} items</div>
    ${category ? `<div class="flyout-category">${category}</div>` : ''}
    <ul class="flyout-items">${itemsHtml}</ul>
  `;

  // Position: if clientX/Y provided, use them; otherwise compute from 3D position
  const contentRect = container.getBoundingClientRect();
  let fx, fy;

  if (clientX !== undefined && clientY !== undefined) {
    fx = clientX - contentRect.left + 20;
    fy = clientY - contentRect.top - 20;
  } else {
    // Compute screen position from 3D world position
    const worldPos = new THREE.Vector3(
      fm.room.pos_x + fm.furn.x,
      fm.room.pos_y + fm.furn.y + fm.furn.h / 2,
      fm.room.pos_z + fm.furn.z
    );
    const screenPos = worldPos.clone().project(camera);
    fx = (screenPos.x * 0.5 + 0.5) * contentRect.width + 30;
    fy = (-screenPos.y * 0.5 + 0.5) * contentRect.height - 40;
  }

  fx = Math.min(fx, contentRect.width - 340);
  fy = Math.max(10, Math.min(fy, contentRect.height - 200));

  flyoutEl.style.left = fx + 'px';
  flyoutEl.style.top = fy + 'px';
  flyoutEl.style.display = 'block';
}

// Auto-show flyout for a furniture piece using its 3D position
function autoShowFlyout(furnId) {
  showFlyout(furnId);
}

function closeFlyout() {
  activeFlyout = null;
  document.getElementById('flyout').style.display = 'none';
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
}
window.closeFlyout = closeFlyout;

function drawFlyoutLine() {
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  if (!activeFlyout) return;

  const fm = activeFlyout.fm;
  const worldPos = new THREE.Vector3(
    fm.room.pos_x + fm.furn.x,
    fm.room.pos_y + fm.furn.y,
    fm.room.pos_z + fm.furn.z
  );
  const screenPos = worldPos.clone().project(camera);

  const contentRect = container.getBoundingClientRect();
  const sx = (screenPos.x * 0.5 + 0.5) * contentRect.width;
  const sy = (-screenPos.y * 0.5 + 0.5) * contentRect.height;

  const flyoutEl = document.getElementById('flyout');
  if (flyoutEl.style.display === 'none') return;
  const fRect = flyoutEl.getBoundingClientRect();
  const fx = fRect.left - contentRect.left;
  const fy = fRect.top - contentRect.top + fRect.height / 2;

  // Draw connecting line
  lineCtx.beginPath();
  lineCtx.moveTo(sx, sy);
  lineCtx.lineTo(fx, fy);
  lineCtx.strokeStyle = 'rgba(91, 141, 239, 0.6)';
  lineCtx.lineWidth = 2;
  lineCtx.setLineDash([6, 4]);
  lineCtx.stroke();

  // Dot at object end
  lineCtx.beginPath();
  lineCtx.arc(sx, sy, 5, 0, Math.PI * 2);
  lineCtx.fillStyle = '#5b8def';
  lineCtx.fill();
  lineCtx.strokeStyle = 'rgba(91, 141, 239, 0.3)';
  lineCtx.lineWidth = 2;
  lineCtx.setLineDash([]);
  lineCtx.beginPath();
  lineCtx.arc(sx, sy, 9, 0, Math.PI * 2);
  lineCtx.stroke();
}

// ---- SEARCH ----
let activeRoomId = null;
let highlightedRooms = new Set();
let highlightedFurn = new Set();
let highlightedItemNames = new Set();

function searchItems(query) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  return ALL_ITEMS.filter(item =>
    item.name.toLowerCase().includes(q) ||
    item.location.toLowerCase().includes(q) ||
    item.furnName.toLowerCase().includes(q) ||
    item.category.toLowerCase().includes(q)
  );
}

function updateHighlights() {
  Object.entries(roomGroups).forEach(([id, rg]) => {
    const isHL = highlightedRooms.has(id);
    const isActive = activeRoomId === id;
    rg.edgeMat.color.set(isHL ? 0xf5a623 : isActive ? 0x5b8def : new THREE.Color(rg.room.color).multiplyScalar(1.5));
    rg.edgeMat.opacity = isHL ? 0.9 : isActive ? 0.8 : 0.6;
    rg.glowMesh.visible = isHL;
  });

  // Only use emissive glow on materials that natively support it
  // (MeshStandardMaterial, MeshPhongMaterial, MeshLambertMaterial).
  // NEVER set emissive on LineBasicMaterial or MeshBasicMaterial — it crashes Three.js.
  Object.entries(furnitureMeshes).forEach(([id, fm]) => {
    const isHL = highlightedFurn.has(id);
    fm.group.traverse(child => {
      if (child.isMesh && child.material && child.material.isMeshStandardMaterial) {
        if (isHL) {
          child.material.emissive.set(0xf5a623);
          child.material.emissiveIntensity = 0.5;
        } else {
          child.material.emissive.set(0x000000);
          child.material.emissiveIntensity = 0;
        }
      }
    });
  });
}

const searchInput = document.getElementById('search');
const resultCountEl = document.getElementById('resultCount');
const searchResultsPanel = document.getElementById('searchResults');
const hintEl = document.getElementById('hint');

searchInput.addEventListener('input', () => {
  const q = searchInput.value;
  const results = searchItems(q);

  highlightedRooms = new Set(results.map(r => r.roomId));
  highlightedFurn = new Set(results.map(r => r.furnId));
  highlightedItemNames = new Set(results.map(r => r.name.toLowerCase()));
  updateHighlights();
  renderSidebar();
  closeFlyout();

  if (results.length > 0) {
    resultCountEl.textContent = `${results.length} match${results.length === 1 ? '' : 'es'} in ${highlightedRooms.size} room${highlightedRooms.size === 1 ? '' : 's'}`;
    hintEl.style.display = 'none';

    // Fly to the first matching furniture piece and auto-show flyout when done
    const firstFurnId = results[0].furnId;
    flyToFurniture(firstFurnId, () => {
      autoShowFlyout(firstFurnId);
    });
    setActiveRoom(results[0].roomId);

    searchResultsPanel.style.display = 'block';
    searchResultsPanel.innerHTML = `
      <div class="search-results-title">Found ${results.length} items</div>
      ${results.map(r => `
        <div class="search-result-item" data-room="${r.roomId}" data-furn="${r.furnId}">
          <div class="search-result-name">${r.name}</div>
          <div class="search-result-loc">${r.roomName} &middot; ${r.furnName} &middot; ${r.location}</div>
        </div>
      `).join('')}
    `;
    searchResultsPanel.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        const furnId = el.dataset.furn;
        closeFlyout();
        flyToFurniture(furnId, () => {
          autoShowFlyout(furnId);
        });
        setActiveRoom(el.dataset.room);
      });
    });
  } else {
    resultCountEl.textContent = q ? 'No matches' : '';
    searchResultsPanel.style.display = 'none';
    hintEl.style.display = q ? 'none' : '';
  }
});

// ---- SIDEBAR ----
function setActiveRoom(id) {
  activeRoomId = id;
  updateHighlights();
  renderSidebar();
}

function renderSidebar() {
  const sb = document.getElementById('sidebarBody');
  const totalItems = ALL_ITEMS.length;

  sb.innerHTML = `
    <div class="sidebar-section">Views</div>
    <div class="nav-item ${!activeRoomId ? 'active' : ''}" data-action="all">
      <span class="nav-icon">3D</span>
      <span class="nav-label">Full House</span>
    </div>
    <div class="sidebar-section">Rooms (${ROOMS.length})</div>
    ${ROOMS.map(r => {
      const count = r.furniture.reduce((s, f) => s + f.items.length, 0);
      const hasResults = highlightedRooms.has(r.id);
      return `
        <div class="nav-item ${activeRoomId === r.id ? 'active' : ''} ${hasResults ? 'has-results' : ''}" data-room="${r.id}">
          <span class="nav-icon">${r.icon}</span>
          <span class="nav-label">${r.name}</span>
          <span class="nav-count">${count}</span>
        </div>
      `;
    }).join('')}
  `;

  sb.querySelectorAll('[data-room]').forEach(el => {
    el.addEventListener('click', () => {
      setActiveRoom(el.dataset.room);
      flyToRoom(el.dataset.room);
      closeFlyout();
    });
  });
  sb.querySelector('[data-action="all"]')?.addEventListener('click', () => {
    setActiveRoom(null);
    animateCameraTo(new THREE.Spherical(30, Math.PI / 5, Math.PI / 5), new THREE.Vector3(4, -0.5, 2));
    closeFlyout();
  });

  document.getElementById('stats').innerHTML = `
    <span><span class="stat-dot" style="background:#5b8def"></span>${ROOMS.length} rooms</span>
    <span><span class="stat-dot" style="background:#4caf50"></span>${ROOMS.reduce((s, r) => s + r.furniture.length, 0)} storage areas</span>
    <span><span class="stat-dot" style="background:#f5a623"></span>${totalItems} items cataloged</span>
  `;
}
renderSidebar();

// ---- SMART WALL VISIBILITY (direction-based, not distance-based) ----
function updateWallTransparency() {
  const camPos = camera.position.clone();

  Object.values(roomGroups).forEach(rg => {
    const roomPos = new THREE.Vector3(rg.room.pos_x, rg.room.pos_y, rg.room.pos_z);
    const isHL = highlightedRooms.has(rg.room.id);
    const isActive = activeRoomId === rg.room.id;

    rg.walls.forEach(wall => {
      const normal = wall.userData._outwardNormal;
      if (!normal) {
        // Ceiling or other non-directional element
        if (wall.material) wall.material.opacity = 0.04;
        return;
      }

      // Wall world position = room position + wall local position
      const wallWorldPos = new THREE.Vector3().copy(wall.position).add(roomPos);

      // Camera-to-wall direction
      const camToWall = new THREE.Vector3().subVectors(wallWorldPos, camPos).normalize();

      // Dot product: positive means normal points same way as cam-to-wall
      // i.e., wall faces away from camera (back wall) → keep visible
      // negative means wall faces toward camera → make transparent
      const dot = normal.dot(camToWall);

      let opacity;
      if (dot > 0.05) {
        // Back wall — faces away from camera, should be visible
        opacity = isActive ? 0.25 : 0.35;
      } else if (dot < -0.05) {
        // Front wall — faces toward camera, should be transparent
        opacity = isActive ? 0.03 : 0.04;
      } else {
        // Edge-on — medium transparency
        opacity = isActive ? 0.12 : 0.15;
      }

      // Handle both single Mesh walls and Group walls (from createWallWithOpenings)
      if (wall.userData._isWallGroup) {
        wall.traverse(child => {
          if (child.material && !child.isLine) child.material.opacity = opacity;
        });
      } else if (wall.material) {
        wall.material.opacity = opacity;
      }
    });

    // Ceiling fades based on camera height relative to room
    const camAboveRoom = camPos.y - roomPos.y;
    if (rg.ceil) rg.ceil.material.opacity = camAboveRoom > rg.room.height ? 0.04 : 0.01;
  });
}

// ---- ANIMATION LOOP ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Fly-to animation
  if (flyAnim) {
    flyAnim.progress = Math.min(flyAnim.progress + delta * 1.2, 1);
    const t = easeInOutCubic(flyAnim.progress);
    target.lerpVectors(flyAnim.startTarget, flyAnim.endTarget, t);
    spherical.radius = THREE.MathUtils.lerp(flyAnim.startSph.radius, flyAnim.endSph.radius, t);
    spherical.phi = THREE.MathUtils.lerp(flyAnim.startSph.phi, flyAnim.endSph.phi, t);
    spherical.theta = THREE.MathUtils.lerp(flyAnim.startSph.theta, flyAnim.endSph.theta, t);
    updateCamera();
    if (flyAnim.progress >= 1) {
      flyAnim = null;
      if (flyAnimCallback) {
        const cb = flyAnimCallback;
        flyAnimCallback = null;
        cb();
      }
    }
  }

  // Pulsing glow
  Object.entries(roomGroups).forEach(([id, rg]) => {
    if (highlightedRooms.has(id)) {
      rg.glowMesh.material.opacity = Math.sin(elapsed * 2.5) * 0.08 + 0.12;
    }
  });

  // Billboard labels
  scene.traverse(child => {
    if (child.isSprite) child.quaternion.copy(camera.quaternion);
  });

  // Smart wall transparency
  updateWallTransparency();

  // Flyout line
  drawFlyoutLine();

  // Resize
  const w = container.clientWidth, h = container.clientHeight;
  if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
    renderer.setSize(w, h);
    lineCanvas.width = w;
    lineCanvas.height = h;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  renderer.render(scene, camera);
}

animate();

// ---- POSTMESSAGE BRIDGE (iframe ↔ React parent) ----
const isInIframe = window.parent !== window;

// Double-click on room floor → navigate to room detail in parent
canvas.addEventListener('dblclick', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const roomFloors = Object.values(roomGroups).map(rg => rg.floor);
  const roomHits = raycaster.intersectObjects(roomFloors);
  if (roomHits.length > 0) {
    const entry = Object.values(roomGroups).find(rg => rg.floor === roomHits[0].object);
    if (entry && isInIframe) {
      window.parent.postMessage({ type: 'roomDoubleClicked', roomId: entry.room.id }, '*');
    }
  }
});

// Listen for commands from React parent
window.addEventListener('message', e => {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'flyToRoom') {
    setActiveRoom(e.data.roomId);
    flyToRoom(e.data.roomId);
  }
  if (e.data.type === 'setHighlight') {
    // Highlight a set of rooms (e.g. from search results)
    const ids = e.data.roomIds || [];
    Object.values(roomGroups).forEach(rg => {
      const isHighlighted = ids.includes(rg.room.id);
      if (rg.fill) rg.fill.material.opacity = isHighlighted ? 0.25 : 0.08;
    });
  }
});

// Signal to parent that we're ready
if (isInIframe) {
  window.parent.postMessage({ type: 'ready' }, '*');
}
</script>
