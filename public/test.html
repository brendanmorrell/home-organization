<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Navigator — Test Harness v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0c12;
  --surface: #12151e;
  --surface2: #1a1e2c;
  --surface3: #222738;
  --border: #2a2f42;
  --text: #e8eaf2;
  --text-dim: #7c81a0;
  --accent: #5b8def;
  --accent-soft: rgba(91, 141, 239, 0.12);
  --highlight: #f5a623;
  --highlight-soft: rgba(245, 166, 35, 0.15);
  --green: #4caf50;
  --red: #ef5350;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.sidebar-header .sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}
.sidebar-section {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  padding: 16px 16px 6px;
}
.sidebar-body { flex: 1; padding: 0 8px; }
.nav-item {
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  margin-bottom: 2px;
  transition: all 0.15s ease;
  position: relative;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); }
.nav-item.has-results { background: var(--highlight-soft); }
.nav-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  color: var(--text-dim);
}
.nav-item.active .nav-icon { background: var(--accent); color: white; }
.nav-item.has-results .nav-icon { background: var(--highlight); color: white; }
.nav-label { flex: 1; font-weight: 500; }
.nav-count {
  font-size: 11px; color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 7px; border-radius: 10px;
  font-weight: 500;
}

/* Camera controls panel in sidebar */
.controls-section {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
}
.controls-section .section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px;
}
.ctrl-row { display: flex; gap: 4px; margin-bottom: 4px; }
.ctrl-btn {
  flex: 1; padding: 6px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  text-align: center; transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* Top bar */
.topbar {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10;
}
.search-box { flex: 1; max-width: 480px; position: relative; }
.search-box input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,141,239,0.15); }
.search-box input::placeholder { color: var(--text-dim); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }
.result-count { font-size: 12px; color: var(--text-dim); white-space: nowrap; font-weight: 500; }
.kbd-hint {
  font-size: 10px; color: var(--text-dim);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 5px; margin-left: auto; white-space: nowrap;
}

/* 3D Canvas area */
.content { flex: 1; position: relative; background: var(--bg); }
canvas#scene { width: 100% !important; height: 100% !important; display: block; }

/* Flyout tooltip */
.flyout {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 220px;
  max-width: 300px;
  z-index: 20;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  pointer-events: auto;
  animation: flyoutIn 0.2s ease-out;
}
@keyframes flyoutIn {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.flyout-close {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 16px; line-height: 1;
}
.flyout-close:hover { color: var(--text); }
.flyout-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.flyout-subtitle { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
.flyout-items { list-style: none; }
.flyout-items li {
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.flyout-items li:last-child { border-bottom: none; }
.flyout-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.flyout-dot.highlight { background: var(--highlight); }
.flyout-item-loc { color: var(--text-dim); font-size: 11px; }

/* Line canvas overlay */
#lineCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 15;
}

/* Search results panel */
.search-results-panel {
  position: absolute; top: 12px; right: 12px;
  background: rgba(18, 21, 30, 0.96);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  max-width: 280px;
  max-height: 50vh;
  overflow-y: auto;
  z-index: 10;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.search-results-title { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
.search-result-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,47,66,0.5);
  cursor: pointer; font-size: 12px;
  transition: color 0.1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { color: var(--accent); }
.search-result-name { font-weight: 600; }
.search-result-loc { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

/* Overlay hints */
.overlay-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(18, 21, 30, 0.92);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 11px; color: var(--text-dim);
  pointer-events: none;
  display: flex; gap: 12px; align-items: center;
  backdrop-filter: blur(8px);
}
.hint-item { display: flex; align-items: center; gap: 4px; }
.hint-key {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 5px; font-size: 10px;
  font-weight: 600;
}

/* Stats bar */
.stats {
  padding: 7px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 20px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}
.stat-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
</style>
</head>
<body>
<div id="app" class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Home Navigator</h1>
      <div class="sub">Search anything in your house</div>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
    <div class="controls-section">
      <div class="section-title">Camera</div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btnTop">Top</button>
        <button class="ctrl-btn" id="btnFront">Front</button>
        <button class="ctrl-btn" id="btnSide">Side</button>
      </div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btnZoomIn">Zoom +</button>
        <button class="ctrl-btn" id="btnZoomOut">Zoom −</button>
        <button class="ctrl-btn" id="btnReset">Reset</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input id="search" type="text" placeholder='Search items... (try "tea tray" or "drill")' />
      </div>
      <span id="resultCount" class="result-count"></span>
      <span class="kbd-hint">&#8984;K to search</span>
    </div>
    <div class="content" id="content">
      <canvas id="scene"></canvas>
      <canvas id="lineCanvas"></canvas>
      <div id="flyout" class="flyout" style="display:none;"></div>
      <div id="searchResults" class="search-results-panel" style="display:none;"></div>
      <div class="overlay-hint" id="hint">
        <span class="hint-item"><span class="hint-key">Drag</span> Rotate</span>
        <span class="hint-item"><span class="hint-key">Scroll</span> Zoom</span>
        <span class="hint-item"><span class="hint-key">Click</span> Inspect</span>
        <span class="hint-item"><span class="hint-key">Right-drag</span> Pan</span>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =========================================================================
// HOME NAVIGATOR v2 — Enhanced 3D Scene
// =========================================================================

// ---- MOCK DATA ----
const ROOMS = [
  {
    id: "r1", name: "Kitchen", icon: "K", color: "#8d6e63",
    pos_x: 0, pos_y: 0, pos_z: 0, width: 5, depth: 4, height: 2.8,
    furniture: [
      { type: "cabinet", name: "Upper Cabinets", x: -1.8, y: 0.7, z: -1.7, w: 2.8, h: 0.8, d: 0.35, color: "#5d4037",
        items: [
          { name: "Spice rack", location: "Right side, top shelf" },
          { name: "Cereal boxes", location: "Left side" },
        ]},
      { type: "cabinet", name: "Island Cabinet", x: 0, y: -0.8, z: 0.3, w: 1.8, h: 0.9, d: 0.7, color: "#4e342e",
        items: [
          { name: "Cast iron skillet", location: "Lower shelf" },
          { name: "Dutch oven", location: "Lower shelf, right" },
        ]},
      { type: "appliance", name: "Stove Area", x: -1.8, y: -0.35, z: -1.5, w: 0.7, h: 1.2, d: 0.6, color: "#37474f",
        items: [
          { name: "Knife block", location: "Counter, right of stove" },
          { name: "Stand mixer", location: "Counter, left of stove" },
        ]},
      { type: "shelf", name: "Vertical Organizer", x: 2.1, y: -0.3, z: -1.5, w: 0.4, h: 1.4, d: 0.35, color: "#5d4037",
        items: [
          { name: "Baking sheets", location: "Vertical slots" },
        ]},
    ]
  },
  {
    id: "r2", name: "Basement", icon: "B", color: "#3949ab",
    pos_x: 0, pos_y: -3.2, pos_z: -6, width: 6.5, depth: 5.5, height: 2.5,
    furniture: [
      { type: "cabinet", name: "Storage Cabinet (Left)", x: -2.5, y: -0.6, z: -2.3, w: 1.2, h: 1.3, d: 0.6, color: "#283593",
        items: [
          { name: "Tea tray", location: "Bottom shelf, left" },
          { name: "Serving bowls", location: "Bottom shelf, right" },
          { name: "Holiday tablecloths", location: "Middle shelf" },
        ]},
      { type: "shelf", name: "Pegboard Wall", x: 2.5, y: 0, z: -2.5, w: 0.2, h: 1.8, d: 2, color: "#1a237e",
        items: [
          { name: "Power drill", location: "Top row hook" },
          { name: "Screwdriver set", location: "Middle row organizer" },
        ]},
      { type: "box", name: "Box Stack A", x: -0.5, y: -0.9, z: 1.5, w: 0.5, h: 0.7, d: 0.5, color: "#795548",
        items: [
          { name: "Extension cords", location: "Top box" },
        ]},
      { type: "box", name: "Box Stack B", x: 0.5, y: -0.8, z: 1.5, w: 0.6, h: 0.9, d: 0.5, color: "#6d4c41",
        items: [
          { name: "Old photo frames", location: "Second box from top" },
          { name: "Christmas lights", location: "Bottom box" },
        ]},
    ]
  },
  {
    id: "r3", name: "Garage", icon: "G", color: "#546e7a",
    pos_x: 8, pos_y: 0, pos_z: 0, width: 5.5, depth: 5, height: 3.2,
    furniture: [
      { type: "shelf", name: "Back Wall Shelving", x: 0, y: 0, z: -2.2, w: 4, h: 2.4, d: 0.5, color: "#455a64",
        items: [
          { name: "Camping tent", location: "Top shelf, in bag" },
          { name: "Cooler", location: "Floor, under shelf" },
          { name: "Paint cans", location: "Middle shelf" },
        ]},
      { type: "appliance", name: "Bike Wall Mount", x: -2.3, y: 0.5, z: 0, w: 0.15, h: 0.6, d: 1.8, color: "#37474f",
        items: [
          { name: "Bicycle", location: "Wall mount, left side" },
        ]},
      { type: "box", name: "Moving Boxes", x: 2, y: -1, z: 1.5, w: 0.6, h: 0.6, d: 0.6, color: "#795548",
        items: [
          { name: "Old textbooks", location: "Box, taped shut" },
        ]},
    ]
  },
  {
    id: "r4", name: "Master Bedroom", icon: "M", color: "#388e3c",
    pos_x: 0, pos_y: 0, pos_z: 7, width: 5, depth: 4.5, height: 2.8,
    furniture: [
      { type: "cabinet", name: "Walk-in Closet", x: -1.8, y: -0.1, z: -1.8, w: 1.5, h: 2.4, d: 1.2, color: "#2e7d32",
        items: [
          { name: "Extra pillows", location: "Top shelf" },
          { name: "Winter blankets", location: "Second shelf" },
          { name: "Luggage set", location: "Floor, back" },
        ]},
      { type: "appliance", name: "Bed Frame", x: 0.5, y: -0.9, z: 0, w: 2, h: 0.6, d: 2.5, color: "#4e342e",
        items: []},
      { type: "shelf", name: "Nightstand", x: 1.8, y: -0.8, z: -0.8, w: 0.5, h: 0.6, d: 0.4, color: "#5d4037",
        items: [
          { name: "Reading lamp", location: "Top" },
        ]},
    ]
  },
  {
    id: "r5", name: "Living Room", icon: "L", color: "#7b1fa2",
    pos_x: 8, pos_y: 0, pos_z: 7, width: 6.5, depth: 5, height: 2.8,
    furniture: [
      { type: "cabinet", name: "TV Stand", x: 0, y: -0.7, z: -2.2, w: 2.5, h: 0.7, d: 0.5, color: "#4a148c",
        items: [
          { name: "Board games", location: "Bottom shelf" },
          { name: "Remote controls", location: "Top drawer" },
        ]},
      { type: "shelf", name: "Bookshelf", x: 2.8, y: 0.1, z: 0, w: 0.35, h: 2.2, d: 1.2, color: "#6a1b9a",
        items: [
          { name: "Photo albums", location: "Third row" },
          { name: "Board game overflow", location: "Bottom row" },
        ]},
      { type: "appliance", name: "Couch", x: 0, y: -0.8, z: 1, w: 2.5, h: 0.8, d: 1.2, color: "#4e342e",
        items: [
          { name: "Throw blankets", location: "Basket by couch" },
        ]},
      { type: "box", name: "Coffee Table", x: 0, y: -1, z: -0.3, w: 1.2, h: 0.45, d: 0.6, color: "#5d4037",
        items: [
          { name: "Coasters", location: "Coffee table drawer" },
        ]},
    ]
  },
];

// Flatten all items for search
const ALL_ITEMS = [];
ROOMS.forEach(room => {
  room.furniture.forEach(furn => {
    furn.items.forEach(item => {
      ALL_ITEMS.push({
        ...item, roomId: room.id, roomName: room.name,
        furnName: furn.name, furnId: room.id + '_' + furn.name.replace(/\s/g, '_'),
      });
    });
  });
});

// ---- THREE.JS SCENE ----
const canvas = document.getElementById('scene');
const container = document.getElementById('content');
const lineCanvas = document.getElementById('lineCanvas');
const lineCtx = lineCanvas.getContext('2d');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0c12);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0c12, 0.018);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
camera.position.set(22, 18, 28);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x6c8cff, 0x3d2817, 0.3);
scene.add(hemiLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 0.6);
sunLight.position.set(15, 30, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 60;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const fillLight = new THREE.PointLight(0x5b8def, 0.2, 40);
fillLight.position.set(-10, 12, -10);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(80, 80);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0d0f18, roughness: 0.95, metalness: 0.05,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.6;
ground.receiveShadow = true;
scene.add(ground);

// Subtle grid
const gridHelper = new THREE.GridHelper(60, 60, 0x1a1e2c, 0x111422);
gridHelper.position.y = -1.59;
scene.add(gridHelper);

// ---- BUILD ROOMS ----
const roomGroups = {};
const furnitureMeshes = {};
const wallMeshes = []; // for transparency control

function createWall(w, h, x, y, z, rotY, color, opacity) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({
    color, transparent: true, opacity: opacity || 0.35,
    side: THREE.DoubleSide, roughness: 0.8, metalness: 0.05,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY || 0;
  mesh.castShadow = false;
  mesh.receiveShadow = true;
  return mesh;
}

ROOMS.forEach(room => {
  const group = new THREE.Group();
  group.position.set(room.pos_x, room.pos_y, room.pos_z);

  const W = room.width, D = room.depth, H = room.height;
  const c = new THREE.Color(room.color);
  const wallColor = c.clone().multiplyScalar(1.2);
  const roomWalls = [];

  // Floor — solid with texture pattern
  const floorGeo = new THREE.PlaneGeometry(W, D);
  const floorMat = new THREE.MeshStandardMaterial({
    color: c.clone().multiplyScalar(0.4), roughness: 0.9, metalness: 0.0,
    side: THREE.DoubleSide,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -H / 2;
  floor.receiveShadow = true;
  group.add(floor);

  // 4 Walls
  const wallOpacity = 0.2;
  const backWall = createWall(W, H, 0, 0, -D/2, 0, wallColor, wallOpacity);
  const frontWall = createWall(W, H, 0, 0, D/2, 0, wallColor, wallOpacity * 0.5);
  const leftWall = createWall(D, H, -W/2, 0, 0, Math.PI/2, wallColor, wallOpacity);
  const rightWall = createWall(D, H, W/2, 0, 0, Math.PI/2, wallColor, wallOpacity * 0.5);

  [backWall, frontWall, leftWall, rightWall].forEach(w => {
    group.add(w);
    wallMeshes.push(w);
    roomWalls.push(w);
  });

  // Ceiling — very subtle
  const ceilGeo = new THREE.PlaneGeometry(W, D);
  const ceilMat = new THREE.MeshStandardMaterial({
    color: wallColor, transparent: true, opacity: 0.06,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const ceil = new THREE.Mesh(ceilGeo, ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = H / 2;
  group.add(ceil);
  wallMeshes.push(ceil);

  // Edges — bright wireframe
  const boxGeo = new THREE.BoxGeometry(W, H, D);
  const edges = new THREE.EdgesGeometry(boxGeo);
  const edgeMat = new THREE.LineBasicMaterial({
    color: c.clone().multiplyScalar(1.5),
    transparent: true, opacity: 0.6,
  });
  const edgeLines = new THREE.LineSegments(edges, edgeMat);
  group.add(edgeLines);

  // Room label (billboard)
  const labelSprite = makeLabel(room.name, 52, '#ffffff');
  labelSprite.position.y = H / 2 + 0.7;
  labelSprite.scale.set(3, 0.8, 1);
  group.add(labelSprite);

  // Item count sublabel
  const totalItems = room.furniture.reduce((s, f) => s + f.items.length, 0);
  const countSprite = makeLabel(totalItems + ' items', 30, '#7c81a0');
  countSprite.position.y = H / 2 + 0.25;
  countSprite.scale.set(2, 0.5, 1);
  group.add(countSprite);

  // ---- FURNITURE ----
  room.furniture.forEach(furn => {
    const fGroup = new THREE.Group();
    fGroup.position.set(furn.x, furn.y, furn.z);

    const furnColor = new THREE.Color(furn.color);
    const fw = furn.w, fh = furn.h, fd = furn.d;

    if (furn.type === 'cabinet' || furn.type === 'box') {
      // Main body
      const bodyGeo = new THREE.BoxGeometry(fw, fh, fd);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.7, metalness: 0.1,
        transparent: true, opacity: 0.85,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      fGroup.add(body);

      // Edges for definition
      const fEdges = new THREE.EdgesGeometry(bodyGeo);
      const fEdgeMat = new THREE.LineBasicMaterial({
        color: furnColor.clone().multiplyScalar(1.8),
        transparent: true, opacity: 0.4,
      });
      fGroup.add(new THREE.LineSegments(fEdges, fEdgeMat));

      // Shelves inside cabinets
      if (furn.type === 'cabinet' && fh > 0.6) {
        const shelfCount = Math.floor(fh / 0.4);
        for (let s = 1; s < shelfCount; s++) {
          const shelfGeo = new THREE.PlaneGeometry(fw - 0.04, fd - 0.04);
          const shelfMat = new THREE.MeshStandardMaterial({
            color: furnColor.clone().multiplyScalar(0.7),
            side: THREE.DoubleSide, transparent: true, opacity: 0.5,
          });
          const shelf = new THREE.Mesh(shelfGeo, shelfMat);
          shelf.rotation.x = -Math.PI / 2;
          shelf.position.y = -fh / 2 + (s * fh / shelfCount);
          fGroup.add(shelf);
        }
      }

      // Stacking indicator for boxes
      if (furn.type === 'box') {
        const tapeGeo = new THREE.PlaneGeometry(fw * 0.6, 0.03);
        const tapeMat = new THREE.MeshBasicMaterial({ color: 0x795548, transparent: true, opacity: 0.6 });
        const tape = new THREE.Mesh(tapeGeo, tapeMat);
        tape.position.y = fh / 2 + 0.001;
        tape.rotation.x = -Math.PI / 2;
        fGroup.add(tape);
      }
    } else if (furn.type === 'shelf') {
      // Open shelving - just vertical and horizontal bars
      const barMat = new THREE.MeshStandardMaterial({ color: furnColor, roughness: 0.6, metalness: 0.2 });
      // Verticals
      const vGeo = new THREE.BoxGeometry(0.04, fh, 0.04);
      [-fw/2, fw/2].forEach(x => {
        [-fd/2, fd/2].forEach(z => {
          const vert = new THREE.Mesh(vGeo, barMat);
          vert.position.set(x, 0, z);
          vert.castShadow = true;
          fGroup.add(vert);
        });
      });
      // Horizontal shelves
      const shelfCount = Math.max(2, Math.floor(fh / 0.5));
      for (let s = 0; s <= shelfCount; s++) {
        const sGeo = new THREE.BoxGeometry(fw, 0.03, fd);
        const sMesh = new THREE.Mesh(sGeo, barMat);
        sMesh.position.y = -fh/2 + s * (fh / shelfCount);
        sMesh.castShadow = true;
        fGroup.add(sMesh);
      }
    } else if (furn.type === 'appliance') {
      // Solid block with slightly different shading
      const bodyGeo = new THREE.BoxGeometry(fw, fh, fd);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: furnColor, roughness: 0.5, metalness: 0.3,
        transparent: true, opacity: 0.9,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      fGroup.add(body);
      const fEdges = new THREE.EdgesGeometry(bodyGeo);
      fGroup.add(new THREE.LineSegments(fEdges, new THREE.LineBasicMaterial({
        color: furnColor.clone().multiplyScalar(1.5), transparent: true, opacity: 0.3,
      })));
    }

    // Furniture label (smaller)
    if (furn.items.length > 0) {
      const fLabel = makeLabel(furn.name, 22, '#b0b3c8');
      fLabel.position.y = furn.h / 2 + 0.25;
      fLabel.scale.set(1.4, 0.35, 1);
      fGroup.add(fLabel);

      // Item count badge
      const badge = makeLabel(furn.items.length + '', 24, '#ffffff', '#5b8def');
      badge.position.y = furn.h / 2 + 0.45;
      badge.position.x = 0.5;
      badge.scale.set(0.3, 0.3, 1);
      fGroup.add(badge);
    }

    group.add(fGroup);

    const furnId = room.id + '_' + furn.name.replace(/\s/g, '_');
    furnitureMeshes[furnId] = {
      group: fGroup, room, furn, roomGroup: group,
      walls: roomWalls,
    };
  });

  // Glow mesh (for search highlighting)
  const glowGeo = new THREE.BoxGeometry(W + 0.4, H + 0.4, D + 0.4);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xf5a623, transparent: true, opacity: 0, side: THREE.BackSide,
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  glowMesh.visible = false;
  group.add(glowMesh);

  scene.add(group);
  roomGroups[room.id] = { group, floor, edgeLines, edgeMat, glowMesh, room, walls: roomWalls, ceil };
});

// Room connection lines on the ground
const connPairs = [['r1','r2'],['r1','r3'],['r1','r4'],['r4','r5'],['r3','r5']];
connPairs.forEach(([a,b]) => {
  const ra = ROOMS.find(r=>r.id===a), rb = ROOMS.find(r=>r.id===b);
  const pts = [
    new THREE.Vector3(ra.pos_x, -1.55, ra.pos_z),
    new THREE.Vector3(rb.pos_x, -1.55, rb.pos_z),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({ color: 0x2a2f42, transparent: true, opacity: 0.3, dashSize: 0.3, gapSize: 0.2 });
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  scene.add(line);
});

// ---- LABEL HELPER ----
function makeLabel(text, fontSize, textColor, bgColor) {
  const cvs = document.createElement('canvas');
  const ctx = cvs.getContext('2d');
  cvs.width = 512; cvs.height = 128;
  if (bgColor) {
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(180, 24, 152, 80, 16);
    ctx.fill();
  }
  ctx.font = `bold ${fontSize || 42}px Inter, -apple-system, sans-serif`;
  ctx.fillStyle = textColor || '#e8eaf2';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  return new THREE.Sprite(mat);
}

// ---- ORBIT CONTROLS ----
let spherical = new THREE.Spherical(30, Math.PI / 5, Math.PI / 5);
let target = new THREE.Vector3(4, -0.5, 2);
let isDragging = false, isRightDragging = false;
let prevMouse = { x: 0, y: 0 };

function updateCamera() {
  camera.position.setFromSpherical(spherical).add(target);
  camera.lookAt(target);
}
updateCamera();

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) { isRightDragging = true; }
  else { isDragging = true; }
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => { isDragging = false; isRightDragging = false; });
window.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  if (isDragging) {
    spherical.theta -= dx * 0.004;
    spherical.phi = Math.max(0.15, Math.min(Math.PI / 2 - 0.05, spherical.phi - dy * 0.004));
    updateCamera();
  }
  if (isRightDragging) {
    const panSpeed = spherical.radius * 0.002;
    const right = new THREE.Vector3();
    right.setFromMatrixColumn(camera.matrix, 0);
    const up = new THREE.Vector3(0, 1, 0);
    target.addScaledVector(right, -dx * panSpeed);
    target.addScaledVector(up, dy * panSpeed);
    updateCamera();
  }
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = 1 + e.deltaY * 0.001;
  spherical.radius = Math.max(5, Math.min(60, spherical.radius * factor));
  updateCamera();
}, { passive: false });

// Camera preset buttons
document.getElementById('btnTop').onclick = () => animateCameraTo(new THREE.Spherical(30, 0.2, 0), new THREE.Vector3(4, -0.5, 2));
document.getElementById('btnFront').onclick = () => animateCameraTo(new THREE.Spherical(25, Math.PI/3, 0), new THREE.Vector3(4, -0.5, 2));
document.getElementById('btnSide').onclick = () => animateCameraTo(new THREE.Spherical(25, Math.PI/4, Math.PI/2), new THREE.Vector3(4, -0.5, 2));
document.getElementById('btnZoomIn').onclick = () => { spherical.radius = Math.max(5, spherical.radius * 0.75); updateCamera(); };
document.getElementById('btnZoomOut').onclick = () => { spherical.radius = Math.min(60, spherical.radius * 1.33); updateCamera(); };
document.getElementById('btnReset').onclick = () => animateCameraTo(new THREE.Spherical(30, Math.PI/5, Math.PI/5), new THREE.Vector3(4, -0.5, 2));

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ---- FLY-TO ----
let flyAnim = null;
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

function animateCameraTo(newSph, newTarget) {
  flyAnim = {
    startTarget: target.clone(), endTarget: newTarget || target.clone(),
    startSph: spherical.clone(), endSph: newSph,
    progress: 0,
  };
}

function flyToRoom(roomId) {
  const rg = roomGroups[roomId];
  if (!rg) return;
  const r = rg.room;
  const dist = Math.max(r.width, r.depth) * 2.2;
  animateCameraTo(
    new THREE.Spherical(dist, Math.PI / 4, spherical.theta),
    new THREE.Vector3(r.pos_x, r.pos_y, r.pos_z)
  );
}

function flyToFurniture(furnId) {
  const fm = furnitureMeshes[furnId];
  if (!fm) return;
  const r = fm.room;
  const f = fm.furn;
  const worldPos = new THREE.Vector3(r.pos_x + f.x, r.pos_y + f.y, r.pos_z + f.z);
  const dist = Math.max(f.w, f.h, f.d) * 5;
  animateCameraTo(
    new THREE.Spherical(Math.max(dist, 4), Math.PI / 4, spherical.theta),
    worldPos
  );
}

// ---- CLICK DETECTION ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let activeFlyout = null;

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check furniture first
  const allFurnObjs = [];
  Object.entries(furnitureMeshes).forEach(([id, fm]) => {
    fm.group.traverse(child => {
      if (child.isMesh) {
        child.userData._furnId = id;
        allFurnObjs.push(child);
      }
    });
  });

  const hits = raycaster.intersectObjects(allFurnObjs);
  if (hits.length > 0) {
    const furnId = hits[0].object.userData._furnId;
    if (furnId) {
      showFlyout(furnId, e.clientX, e.clientY);
      return;
    }
  }

  // Check room fills (floor click)
  const roomFloors = Object.values(roomGroups).map(rg => rg.floor);
  const roomHits = raycaster.intersectObjects(roomFloors);
  if (roomHits.length > 0) {
    const entry = Object.values(roomGroups).find(rg => rg.floor === roomHits[0].object);
    if (entry) {
      setActiveRoom(entry.room.id);
      flyToRoom(entry.room.id);
    }
    closeFlyout();
    return;
  }

  closeFlyout();
});

// ---- FLYOUT SYSTEM ----
function showFlyout(furnId, clientX, clientY) {
  const fm = furnitureMeshes[furnId];
  if (!fm || fm.furn.items.length === 0) return;

  activeFlyout = { furnId, fm };
  const flyoutEl = document.getElementById('flyout');

  const isHighlighted = (name) => highlightedItemNames.has(name.toLowerCase());
  const itemsHtml = fm.furn.items.map(item => `
    <li>
      <span class="flyout-dot ${isHighlighted(item.name) ? 'highlight' : ''}"></span>
      <span>
        <span style="font-weight:600">${item.name}</span>
        <div class="flyout-item-loc">${item.location}</div>
      </span>
    </li>
  `).join('');

  flyoutEl.innerHTML = `
    <button class="flyout-close" onclick="closeFlyout()">&times;</button>
    <div class="flyout-title">${fm.furn.name}</div>
    <div class="flyout-subtitle">${fm.room.name} &middot; ${fm.furn.items.length} items</div>
    <ul class="flyout-items">${itemsHtml}</ul>
  `;

  // Position near click, but keep on screen
  const contentRect = container.getBoundingClientRect();
  let fx = clientX - contentRect.left + 20;
  let fy = clientY - contentRect.top - 20;
  fx = Math.min(fx, contentRect.width - 300);
  fy = Math.max(10, Math.min(fy, contentRect.height - 200));

  flyoutEl.style.left = fx + 'px';
  flyoutEl.style.top = fy + 'px';
  flyoutEl.style.display = 'block';
}

function closeFlyout() {
  activeFlyout = null;
  document.getElementById('flyout').style.display = 'none';
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
}
window.closeFlyout = closeFlyout;

function drawFlyoutLine() {
  lineCtx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
  if (!activeFlyout) return;

  const fm = activeFlyout.fm;
  const worldPos = new THREE.Vector3(
    fm.room.pos_x + fm.furn.x,
    fm.room.pos_y + fm.furn.y,
    fm.room.pos_z + fm.furn.z
  );
  const screenPos = worldPos.clone().project(camera);

  const contentRect = container.getBoundingClientRect();
  const sx = (screenPos.x * 0.5 + 0.5) * contentRect.width;
  const sy = (-screenPos.y * 0.5 + 0.5) * contentRect.height;

  const flyoutEl = document.getElementById('flyout');
  if (flyoutEl.style.display === 'none') return;
  const fRect = flyoutEl.getBoundingClientRect();
  const fx = fRect.left - contentRect.left;
  const fy = fRect.top - contentRect.top + fRect.height / 2;

  lineCtx.beginPath();
  lineCtx.moveTo(sx, sy);
  lineCtx.lineTo(fx, fy);
  lineCtx.strokeStyle = 'rgba(91, 141, 239, 0.5)';
  lineCtx.lineWidth = 1.5;
  lineCtx.setLineDash([4, 4]);
  lineCtx.stroke();

  // Dot at object
  lineCtx.beginPath();
  lineCtx.arc(sx, sy, 4, 0, Math.PI * 2);
  lineCtx.fillStyle = '#5b8def';
  lineCtx.fill();
}

// ---- SEARCH ----
let activeRoomId = null;
let highlightedRooms = new Set();
let highlightedFurn = new Set();
let highlightedItemNames = new Set();

function searchItems(query) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  return ALL_ITEMS.filter(item =>
    item.name.toLowerCase().includes(q) ||
    item.location.toLowerCase().includes(q) ||
    item.furnName.toLowerCase().includes(q)
  );
}

function updateHighlights() {
  Object.entries(roomGroups).forEach(([id, rg]) => {
    const isHL = highlightedRooms.has(id);
    const isActive = activeRoomId === id;
    rg.edgeMat.color.set(isHL ? 0xf5a623 : isActive ? 0x5b8def : new THREE.Color(rg.room.color).multiplyScalar(1.5));
    rg.edgeMat.opacity = isHL ? 0.9 : isActive ? 0.8 : 0.6;
    rg.glowMesh.visible = isHL;
    rg.walls.forEach(w => {
      w.material.opacity = isHL ? 0.08 : isActive ? 0.15 : 0.2;
    });
  });

  Object.entries(furnitureMeshes).forEach(([id, fm]) => {
    const isHL = highlightedFurn.has(id);
    fm.group.traverse(child => {
      if (child.isMesh && child.material) {
        if (isHL) {
          child.material._origColor = child.material._origColor || child.material.color.getHex();
          child.material.emissive = child.material.emissive || new THREE.Color();
          child.material.emissive.set(0xf5a623);
          child.material.emissiveIntensity = 0.4;
        } else {
          if (child.material.emissive) {
            child.material.emissive.set(0x000000);
            child.material.emissiveIntensity = 0;
          }
        }
      }
    });
  });
}

const searchInput = document.getElementById('search');
const resultCountEl = document.getElementById('resultCount');
const searchResultsPanel = document.getElementById('searchResults');
const hintEl = document.getElementById('hint');

searchInput.addEventListener('input', () => {
  const q = searchInput.value;
  const results = searchItems(q);

  highlightedRooms = new Set(results.map(r => r.roomId));
  highlightedFurn = new Set(results.map(r => r.furnId));
  highlightedItemNames = new Set(results.map(r => r.name.toLowerCase()));
  updateHighlights();
  renderSidebar();

  if (results.length > 0) {
    resultCountEl.textContent = `${results.length} match${results.length === 1 ? '' : 'es'} in ${highlightedRooms.size} room${highlightedRooms.size === 1 ? '' : 's'}`;
    hintEl.style.display = 'none';
    flyToRoom(results[0].roomId);

    searchResultsPanel.style.display = 'block';
    searchResultsPanel.innerHTML = `
      <div class="search-results-title">Found ${results.length} items</div>
      ${results.map(r => `
        <div class="search-result-item" data-room="${r.roomId}" data-furn="${r.furnId}">
          <div class="search-result-name">${r.name}</div>
          <div class="search-result-loc">${r.roomName} &middot; ${r.furnName} &middot; ${r.location}</div>
        </div>
      `).join('')}
    `;
    searchResultsPanel.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        const furnId = el.dataset.furn;
        flyToFurniture(furnId);
        setActiveRoom(el.dataset.room);
      });
    });
  } else {
    resultCountEl.textContent = q ? 'No matches' : '';
    searchResultsPanel.style.display = 'none';
    hintEl.style.display = q ? 'none' : '';
  }
});

// ---- SIDEBAR ----
function setActiveRoom(id) {
  activeRoomId = id;
  updateHighlights();
  renderSidebar();
}

function renderSidebar() {
  const sb = document.getElementById('sidebarBody');
  const totalItems = ALL_ITEMS.length;

  sb.innerHTML = `
    <div class="sidebar-section">Views</div>
    <div class="nav-item ${!activeRoomId ? 'active' : ''}" data-action="all">
      <span class="nav-icon">3D</span>
      <span class="nav-label">Full House</span>
    </div>
    <div class="sidebar-section">Rooms (${ROOMS.length})</div>
    ${ROOMS.map(r => {
      const count = r.furniture.reduce((s, f) => s + f.items.length, 0);
      const hasResults = highlightedRooms.has(r.id);
      return `
        <div class="nav-item ${activeRoomId === r.id ? 'active' : ''} ${hasResults ? 'has-results' : ''}" data-room="${r.id}">
          <span class="nav-icon">${r.icon}</span>
          <span class="nav-label">${r.name}</span>
          <span class="nav-count">${count}</span>
        </div>
      `;
    }).join('')}
  `;

  sb.querySelectorAll('[data-room]').forEach(el => {
    el.addEventListener('click', () => {
      setActiveRoom(el.dataset.room);
      flyToRoom(el.dataset.room);
      closeFlyout();
    });
  });
  sb.querySelector('[data-action="all"]')?.addEventListener('click', () => {
    setActiveRoom(null);
    animateCameraTo(new THREE.Spherical(30, Math.PI / 5, Math.PI / 5), new THREE.Vector3(4, -0.5, 2));
    closeFlyout();
  });

  document.getElementById('stats').innerHTML = `
    <span><span class="stat-dot" style="background:#5b8def"></span>${ROOMS.length} rooms</span>
    <span><span class="stat-dot" style="background:#4caf50"></span>${ROOMS.reduce((s, r) => s + r.furniture.length, 0)} storage areas</span>
    <span><span class="stat-dot" style="background:#f5a623"></span>${totalItems} items cataloged</span>
  `;
}
renderSidebar();

// ---- WALL TRANSPARENCY BASED ON CAMERA DISTANCE ----
function updateWallTransparency() {
  Object.values(roomGroups).forEach(rg => {
    const roomPos = new THREE.Vector3(rg.room.pos_x, rg.room.pos_y, rg.room.pos_z);
    const dist = camera.position.distanceTo(roomPos);
    const maxDist = Math.max(rg.room.width, rg.room.depth) * 3;

    // Walls become more transparent as camera gets closer
    const baseOpacity = highlightedRooms.has(rg.room.id) ? 0.06 : activeRoomId === rg.room.id ? 0.1 : 0.2;
    const factor = Math.min(1, Math.max(0.1, dist / maxDist));
    rg.walls.forEach(w => {
      w.material.opacity = baseOpacity * factor;
    });

    // Ceiling fades as you get close
    rg.ceil.material.opacity = Math.min(0.06, 0.06 * factor);
  });
}

// ---- ANIMATION LOOP ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Fly-to
  if (flyAnim) {
    flyAnim.progress = Math.min(flyAnim.progress + delta * 1.2, 1);
    const t = easeInOutCubic(flyAnim.progress);
    target.lerpVectors(flyAnim.startTarget, flyAnim.endTarget, t);
    spherical.radius = THREE.MathUtils.lerp(flyAnim.startSph.radius, flyAnim.endSph.radius, t);
    spherical.phi = THREE.MathUtils.lerp(flyAnim.startSph.phi, flyAnim.endSph.phi, t);
    spherical.theta = THREE.MathUtils.lerp(flyAnim.startSph.theta, flyAnim.endSph.theta, t);
    updateCamera();
    if (flyAnim.progress >= 1) flyAnim = null;
  }

  // Pulsing glow
  Object.entries(roomGroups).forEach(([id, rg]) => {
    if (highlightedRooms.has(id)) {
      rg.glowMesh.material.opacity = Math.sin(elapsed * 2.5) * 0.08 + 0.12;
    }
  });

  // Billboard labels
  scene.traverse(child => {
    if (child.isSprite) child.quaternion.copy(camera.quaternion);
  });

  // Wall transparency
  updateWallTransparency();

  // Flyout line
  drawFlyoutLine();

  // Resize
  const w = container.clientWidth, h = container.clientHeight;
  if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
    renderer.setSize(w, h);
    lineCanvas.width = w;
    lineCanvas.height = h;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  renderer.render(scene, camera);
}

animate();
</script>
